basePath: /api
definitions:
  api.Container:
    properties:
      id:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
      names:
        items:
          type: string
        type: array
      state:
        type: string
    type: object
  api.ContainerListResponse:
    properties:
      containers:
        items:
          $ref: '#/definitions/api.Container'
        type: array
    type: object
  api.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  api.GetConfigResponse:
    properties:
      tileUri:
        type: string
    type: object
  api.GetSettingsResponse:
    properties:
      settings:
        additionalProperties: {}
        type: object
    type: object
  api.OkResponse:
    properties:
      ok:
        type: string
    type: object
  api.Schedule:
    properties:
      area:
        type: integer
      createdAt:
        type: string
      daysOfWeek:
        description: 0=Sunday .. 6=Saturday
        items:
          type: integer
        type: array
      enabled:
        type: boolean
      id:
        type: string
      lastRun:
        type: string
      time:
        description: HH:mm format
        type: string
    type: object
  api.ScheduleListResponse:
    properties:
      schedules:
        items:
          $ref: '#/definitions/api.Schedule'
        type: array
    type: object
  api.SettingsStatusResponse:
    properties:
      onboarding_completed:
        type: boolean
    type: object
  api.SystemInfo:
    properties:
      cpuTemperature:
        type: number
    type: object
  geometry.Point:
    properties:
      x:
        type: number
      "y":
        type: number
      z:
        type: number
    type: object
  geometry.Point32:
    properties:
      x:
        type: number
      "y":
        type: number
      z:
        type: number
    type: object
  geometry.Polygon:
    properties:
      points:
        items:
          $ref: '#/definitions/geometry.Point32'
        type: array
    type: object
  geometry.Pose:
    properties:
      orientation:
        $ref: '#/definitions/geometry.Quaternion'
      position:
        $ref: '#/definitions/geometry.Point'
    type: object
  geometry.Quaternion:
    properties:
      w:
        type: number
      x:
        type: number
      "y":
        type: number
      z:
        type: number
    type: object
  mowgli.AddMowingAreaReq:
    properties:
      area:
        $ref: '#/definitions/mowgli.MapArea'
      is_navigation_area:
        type: boolean
    type: object
  mowgli.MapArea:
    properties:
      area:
        $ref: '#/definitions/geometry.Polygon'
      is_navigation_area:
        type: boolean
      name:
        type: string
      obstacles:
        items:
          $ref: '#/definitions/geometry.Polygon'
        type: array
    type: object
  mowgli.ReplaceMapArea:
    properties:
      area:
        $ref: '#/definitions/mowgli.MapArea'
      is_navigation_area:
        type: boolean
    type: object
  mowgli.ReplaceMapReq:
    properties:
      areas:
        items:
          $ref: '#/definitions/mowgli.ReplaceMapArea'
        type: array
    type: object
  mowgli.SetDockingPointReq:
    properties:
      docking_pose:
        $ref: '#/definitions/geometry.Pose'
    type: object
  types.FirmwareConfig:
    properties:
      batChargeCutoffVoltage:
        type: number
      boardType:
        type: string
      bothWheelsLiftEmergencyMillis:
        type: integer
      branch:
        type: string
      debugType:
        type: string
      directory:
        type: string
      disableEmergency:
        type: boolean
      externalImuAcceleration:
        type: boolean
      externalImuAngular:
        type: boolean
      file:
        type: string
      imuOnboardInclinationThreshold:
        type: integer
      limitVoltage150MA:
        type: number
      masterJ18:
        type: boolean
      maxChargeCurrent:
        type: number
      maxChargeVoltage:
        type: number
      maxMps:
        type: number
      oneWheelLiftEmergencyMillis:
        type: integer
      panelType:
        type: string
      perimeterWire:
        type: boolean
      playButtonClearEmergencyMillis:
        type: integer
      repository:
        type: string
      stopButtonEmergencyMillis:
        type: integer
      tickPerM:
        type: number
      tiltEmergencyMillis:
        type: integer
      version:
        type: string
      wheelBase:
        type: number
    type: object
host: localhost:4200
info:
  contact: {}
  description: API for the MowgliNext autonomous robot mower GUI
  title: MowgliNext GUI API
  version: "1.0"
paths:
  /config/envs:
    get:
      description: get config env from backend
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GetConfigResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: get config env from backend
      tags:
      - config
  /config/keys/get:
    post:
      description: get config from backend
      parameters:
      - description: settings
        in: body
        name: settings
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: get config from backend
      tags:
      - config
  /config/keys/set:
    post:
      description: set config to backend
      parameters:
      - description: settings
        in: body
        name: settings
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: set config to backend
      tags:
      - config
  /containers:
    get:
      description: list all containers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ContainerListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: list all containers
      tags:
      - containers
  /containers/{containerId}/{command}:
    post:
      description: execute a command on a container
      parameters:
      - description: container id
        in: path
        name: containerId
        required: true
        type: string
      - description: command to execute (start/stop/restart)
        in: path
        name: command
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: execute a command on a container
      tags:
      - containers
  /containers/{containerId}/logs:
    get:
      description: get container logs
      parameters:
      - description: container id
        in: path
        name: containerId
        required: true
        type: string
      produces:
      - text/event-stream
      responses: {}
      summary: get container logs
      tags:
      - containers
  /mowglinext/call/{command}:
    post:
      consumes:
      - application/json
      description: call a service
      parameters:
      - description: 'command to call, could be: high_level_control, emergency, mow_enabled,
          start_in_area'
        in: path
        name: command
        required: true
        type: string
      - description: request body
        in: body
        name: CallReq
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: call a service
      tags:
      - mowglinext
  /mowglinext/map:
    delete:
      consumes:
      - application/json
      description: clear the map
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: clear the map
      tags:
      - mowglinext
    put:
      consumes:
      - application/json
      description: clear the map and insert all provided areas in a single transaction
      parameters:
      - description: replace map request body
        in: body
        name: CallReq
        required: true
        schema:
          $ref: '#/definitions/mowgli.ReplaceMapReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Delete the current map and replace all areas
      tags:
      - mowglinext
  /mowglinext/map/area/add:
    post:
      consumes:
      - application/json
      description: add a map area
      parameters:
      - description: request body
        in: body
        name: CallReq
        required: true
        schema:
          $ref: '#/definitions/mowgli.AddMowingAreaReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: add a map area
      tags:
      - mowglinext
  /mowglinext/map/docking:
    post:
      consumes:
      - application/json
      description: set the docking point
      parameters:
      - description: request body
        in: body
        name: CallReq
        required: true
        schema:
          $ref: '#/definitions/mowgli.SetDockingPointReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: set the docking point
      tags:
      - mowglinext
  /mowglinext/publish/{topic}:
    get:
      description: publish to a topic
      parameters:
      - description: 'topic to publish to, could be: joy'
        in: path
        name: topic
        required: true
        type: string
      responses: {}
      summary: publish to a topic
      tags:
      - mowglinext
  /mowglinext/subscribe/{topic}:
    get:
      description: subscribe to a topic
      parameters:
      - description: 'logical topic key: diagnostics, status, highLevelStatus, gps,
          pose, imu, ticks, map, path, plan, mowingPath, power, emergency, dockingSensor,
          lidar'
        in: path
        name: topic
        required: true
        type: string
      responses: {}
      summary: subscribe to a topic
      tags:
      - mowglinext
  /schedules:
    get:
      description: list all mowing schedules
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ScheduleListResponse'
      summary: list all schedules
      tags:
      - schedules
    post:
      consumes:
      - application/json
      description: create a new mowing schedule
      parameters:
      - description: schedule
        in: body
        name: schedule
        required: true
        schema:
          $ref: '#/definitions/api.Schedule'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Schedule'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: create a schedule
      tags:
      - schedules
  /schedules/{id}:
    delete:
      description: delete a mowing schedule
      parameters:
      - description: schedule ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: delete a schedule
      tags:
      - schedules
    put:
      consumes:
      - application/json
      description: update an existing mowing schedule
      parameters:
      - description: schedule ID
        in: path
        name: id
        required: true
        type: string
      - description: schedule
        in: body
        name: schedule
        required: true
        schema:
          $ref: '#/definitions/api.Schedule'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Schedule'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: update a schedule
      tags:
      - schedules
  /settings:
    get:
      description: returns a JSON object with the settings
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GetSettingsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: returns a JSON object with the settings
      tags:
      - settings
    post:
      consumes:
      - application/json
      description: saves the settings to the mower_config.sh file
      parameters:
      - description: settings key-value map
        in: body
        name: settings
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: saves the settings to the mower_config.sh file
      tags:
      - settings
  /settings/schema:
    get:
      description: returns the JSON Schema for mower configuration parameters
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: returns the mower config JSON Schema
      tags:
      - settings
  /settings/status:
    get:
      description: returns whether onboarding has been completed
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SettingsStatusResponse'
      summary: get settings onboarding status
      tags:
      - settings
    post:
      description: marks onboarding as completed so the wizard is not shown again
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: mark onboarding as completed
      tags:
      - settings
  /settings/yaml:
    get:
      description: returns the current YAML mower configuration values as a flat key-value
        map
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: returns the current YAML mower configuration
      tags:
      - settings
    post:
      consumes:
      - application/json
      description: saves the mower configuration as YAML to mowgli_robot.yaml
      parameters:
      - description: flat key-value settings map
        in: body
        name: settings
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: saves the mower configuration as YAML
      tags:
      - settings
  /setup/flashBoard:
    post:
      consumes:
      - application/json
      description: flash the mower board with the given config
      parameters:
      - description: config
        in: body
        name: settings
        required: true
        schema:
          $ref: '#/definitions/types.FirmwareConfig'
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: flash the mower board with the given config
      tags:
      - setup
  /system/info:
    get:
      description: get system info such as CPU temperature
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SystemInfo'
      summary: get system info
      tags:
      - system
  /system/reboot:
    post:
      description: reboots the Raspberry Pi
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: reboot the system
      tags:
      - system
  /system/shutdown:
    post:
      description: shuts down the Raspberry Pi
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: shutdown the system
      tags:
      - system
swagger: "2.0"
