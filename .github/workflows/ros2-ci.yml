name: ROS2 — CI

on:
  push:
    branches: [main]
    paths:
      - 'ros2/**'
      - '.github/workflows/ros2-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ros2/**'
      - '.github/workflows/ros2-ci.yml'

concurrency:
  group: ros2-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ROS_DISTRO: kilted

jobs:
  # ─── Build & Test ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (ROS2 ${{ matrix.ros_distro }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: kilted
            ubuntu: "24.04"

    defaults:
      run:
        working-directory: ros2

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup ROS2 ${{ matrix.ros_distro }}
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distro }}

      # GTSAM 4.3a1 is required by fusion_graph (find_package(GTSAM CONFIG
      # REQUIRED) in its CMakeLists). The Ubuntu apt package ships 4.2 with
      # a broken GTSAMConfig.cmake AND the legacy boost::optional<Matrix&>
      # custom-factor API, so the Docker image build (ros2/Dockerfile stage 0)
      # builds 4.3a1 from source and lands it under /opt/gtsam. We mirror the
      # same recipe here, cached so subsequent runs are instant.
      - name: Cache GTSAM build
        id: cache-gtsam
        uses: actions/cache@v4
        with:
          path: /opt/gtsam
          key: gtsam-4.3a1-${{ runner.os }}-noble

      - name: Build GTSAM 4.3a1 from source
        working-directory: .
        if: steps.cache-gtsam.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git \
            libboost-all-dev libeigen3-dev libmetis-dev
          cd /tmp
          git clone --depth 1 -b 4.3a1 https://github.com/borglab/gtsam.git
          cd gtsam && mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/gtsam \
            -DGTSAM_BUILD_TESTS=OFF \
            -DGTSAM_BUILD_EXAMPLES_ALWAYS=OFF \
            -DGTSAM_BUILD_PYTHON=OFF \
            -DGTSAM_BUILD_UNSTABLE=OFF \
            -DGTSAM_USE_SYSTEM_EIGEN=ON \
            -DGTSAM_USE_SYSTEM_METIS=ON \
            -DGTSAM_WITH_TBB=OFF \
            -DGTSAM_WITH_EIGEN_MKL=OFF \
            -DGTSAM_INSTALL_MATLAB_TOOLBOX=OFF \
            -DBUILD_SHARED_LIBS=ON
          sudo make -j$(nproc) install
          # The ldconfig + CMAKE_PREFIX_PATH setup is done in subsequent
          # steps so that cached restores also see the library.

      - name: Register GTSAM in linker + CMake search paths
        run: |
          echo "/opt/gtsam/lib" | sudo tee /etc/ld.so.conf.d/gtsam.conf
          sudo ldconfig
          echo "CMAKE_PREFIX_PATH=/opt/gtsam:$CMAKE_PREFIX_PATH" >> $GITHUB_ENV
          echo "GTSAM_DIR=/opt/gtsam/lib/cmake/GTSAM" >> $GITHUB_ENV
          # Pre-install runtime apt deps that GTSAM links against (boost,
          # eigen, metis), in case the cache restore skipped the apt step.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libboost-all-dev libeigen3-dev libmetis-dev

      - name: Cache rosdep
        uses: actions/cache@v4
        with:
          path: ~/.ros/rosdep
          key: rosdep-${{ matrix.ros_distro }}-${{ hashFiles('ros2/src/**/package.xml') }}
          restore-keys: |
            rosdep-${{ matrix.ros_distro }}-

      - name: Install rosdep dependencies
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          sudo apt-get update
          rosdep update --rosdistro ${{ matrix.ros_distro }}
          rosdep install \
            --from-paths src \
            --ignore-src \
            --rosdistro ${{ matrix.ros_distro }} \
            -y

      - name: Cache colcon workspace
        uses: actions/cache@v4
        with:
          path: |
            ros2/build
            ros2/install
            ros2/log
          key: colcon-v2-${{ matrix.ros_distro }}-${{ hashFiles('ros2/src/**/CMakeLists.txt', 'ros2/src/**/package.xml', 'ros2/src/**/*.cpp', 'ros2/src/**/*.hpp') }}
          restore-keys: |
            colcon-v2-${{ matrix.ros_distro }}-

      - name: Build workspace
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          colcon build \
            --cmake-args -DCMAKE_BUILD_TYPE=Release \
            --parallel-workers $(nproc) \
            --event-handlers console_cohesion+

      - name: Run tests
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          colcon test \
            --return-code-on-test-failure \
            --event-handlers console_cohesion+
          colcon test-result --verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.ros_distro }}
          path: |
            ros2/build/**/test_results/**/*.xml
            ros2/log/latest_test/**
          retention-days: 14

  # ─── Formatting Check ────────────────────────────────────────────────────────
  format-check:
    name: Formatting (clang-format)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Cache pip clang-format
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-clang-format-18.1.8

      - name: Install clang-format
        run: pip install clang-format==18.1.8

      - name: Check formatting
        run: |
          FILES=$(find ros2/src/ \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) \
            -not -path "*/opennav_coverage/*" \
            )
          if [ -z "$FILES" ]; then
            echo "No C++ files found — skipping."
            exit 0
          fi
          echo "$FILES" | xargs clang-format --dry-run --Werror -style=file:ros2/.clang-format
          echo "All files are correctly formatted."

  # ─── Static Analysis ─────────────────────────────────────────────────────────
  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          FILES=$(find ros2/src/ \( -name "*.cpp" -o -name "*.hpp" \) \
            -not -path "*/test/*" -not -path "*/opennav_coverage/*" \
            )
          if [ -z "$FILES" ]; then
            echo "No C++ files found — skipping."
            exit 0
          fi
          # Common cppcheck flags. --inline-suppr lets us silence narrow false
          # positives at the call-site with `// cppcheck-suppress <id>` comments
          # rather than maintaining a global suppress list.
          # Global suppressions for known false positives that aren't worth
          # an inline annotation:
          #   - useInitializationList: ROS2 nodes commonly assign members
          #     (callback groups, QoS, paths read from declare_parameter) in
          #     the body because those calls require the rclcpp::Node
          #     constructor to have run first.
          CPPCHECK_FLAGS=(
            --enable=warning,performance,portability
            --inline-suppr
            --suppress=missingInclude
            --suppress=unmatchedSuppression
            --suppress=useInitializationList
            --suppress=normalCheckLevelMaxBranches
            --error-exitcode=1
          )
          echo "$FILES" | xargs cppcheck "${CPPCHECK_FLAGS[@]}" --xml 2>cppcheck-report.xml
          echo "$FILES" | xargs cppcheck "${CPPCHECK_FLAGS[@]}" --quiet

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cppcheck-report
          path: cppcheck-report.xml
          if-no-files-found: ignore
          retention-days: 7
