name: Sensor Docker (reusable)

# Reusable workflow that builds a single sensor image (multi-arch) and
# pushes a multi-arch manifest. One thin caller per sensor lives in
# sensors-<image>.yml — that caller decides on which paths/branches it
# fires. This file is not triggered directly.

on:
  workflow_call:
    inputs:
      image:
        description: 'Image name under ghcr.io/<repo>/'
        type: string
        required: true
      context:
        description: 'Build context path (e.g. ./sensors/gps)'
        type: string
        required: true
      dockerfile:
        description: 'Optional Dockerfile path relative to the repository root'
        type: string
        required: false
        default: ''
      target:
        description: 'Optional Dockerfile target stage'
        type: string
        required: false
        default: ''
      smoke-test:
        description: 'Optional shell script to run inside the built image'
        type: string
        required: false
        default: ''
      no-cache:
        description: 'Build without Docker layer cache'
        type: boolean
        required: false
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build ${{ inputs.image }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        arch: [linux/amd64, linux/arm64]
        include:
          - arch: linux/amd64
            runner: ubuntu-24.04
          - arch: linux/arm64
            runner: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ inputs.image }}

      - name: Build and push by digest
        id: build_default
        if: inputs.dockerfile == ''
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          target: ${{ inputs.target }}
          platforms: ${{ matrix.arch }}
          no-cache: ${{ inputs.no-cache }}
          cache-from: ${{ inputs.no-cache != true && format('type=registry,ref={0}/{1}:buildcache-{2}', env.IMAGE_PREFIX, inputs.image, matrix.arch == 'linux/arm64' && 'arm64' || 'amd64') || '' }}
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ inputs.image }}:buildcache-${{ matrix.arch == 'linux/arm64' && 'arm64' || 'amd64' }},mode=max
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/${{ inputs.image }},push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true

      - name: Build and push by digest
        id: build_custom
        if: inputs.dockerfile != ''
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.target }}
          platforms: ${{ matrix.arch }}
          no-cache: ${{ inputs.no-cache }}
          cache-from: ${{ inputs.no-cache != true && format('type=registry,ref={0}/{1}:buildcache-{2}', env.IMAGE_PREFIX, inputs.image, matrix.arch == 'linux/arm64' && 'arm64' || 'amd64') || '' }}
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ inputs.image }}:buildcache-${{ matrix.arch == 'linux/arm64' && 'arm64' || 'amd64' }},mode=max
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/${{ inputs.image }},push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true

      - name: Smoke test image
        if: inputs.smoke-test != ''
        env:
          DIGEST: ${{ steps.build_custom.outputs.digest || steps.build_default.outputs.digest }}
          IMAGE: ${{ env.IMAGE_PREFIX }}/${{ inputs.image }}
          SMOKE_TEST: ${{ inputs.smoke-test }}
        run: |
          set -euo pipefail
          script="/tmp/${{ inputs.image }}-smoke.sh"
          printf '%s\n' "$SMOKE_TEST" > "$script"
          chmod +x "$script"
          docker run --rm \
            -v "$script:/tmp/smoke-test.sh:ro" \
            "${IMAGE}@${DIGEST}" \
            bash /tmp/smoke-test.sh

      - name: Export digest
        env:
          DIGEST: ${{ steps.build_custom.outputs.digest || steps.build_default.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Sanitise arch name for artifact
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          clean=${ARCH////-}
          echo "ARTIFACT_NAME=${clean}" >> "$GITHUB_ENV"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ inputs.image }}-${{ env.ARTIFACT_NAME }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest (${{ inputs.image }})
    runs-on: ubuntu-24.04
    needs: build

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digests-${{ inputs.image }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ inputs.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          IMG: ${{ env.IMAGE_PREFIX }}/${{ inputs.image }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMG}@sha256:%s " *)

      - name: Inspect image
        env:
          IMG: ${{ env.IMAGE_PREFIX }}/${{ inputs.image }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: docker buildx imagetools inspect "${IMG}:${VERSION}"
