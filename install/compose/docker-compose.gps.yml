  # -------------------------------------------------------------------------
  # Canonical direct-GNSS sidecar.
  #
  # PR 2 runtime flip:
  #   GNSS_STACK=universal now means the existing mowgli-gps sidecar owns
  #   Universal GNSS and publishes the shared external contract:
  #     /gps/fix
  #     /gps/status
  #     /diagnostics
  #     /rtcm
  #
  # Universal GNSS is the only supported direct-GNSS runtime.
  # -------------------------------------------------------------------------
x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"
  # Use the bundled cyclonedds.xml so MaxAutoParticipantIndex=500 takes
  # effect — without it cyclone caps at 9 per host and the
  # gps_health_aggregator side-process fails with "Failed to find a
  # free participant index".
  CYCLONEDDS_URI: file:///cyclonedds.xml

services:

  gps:
    container_name: mowgli-gps
    image: ${GPS_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    environment:
      <<: *ros2-env
      HARDWARE_BACKEND: ${HARDWARE_BACKEND}
      GNSS_STACK: ${GNSS_STACK:-universal}
      # Pass these through WITHOUT hard defaults. They are fallback-only:
      # start_gps.sh resolves runtime GNSS config as YAML explicit value first,
      # then env fallback, then its own built-in default. An empty env value
      # therefore means "not set" and must never override the bound
      # mowgli_robot.yaml. Baking a default here would silently mask an
      # operator's explicit YAML choice (for example ntrip_enabled:false, a
      # custom frame_id, or a serial device selected in the GUI).
      GNSS_RECEIVER_FAMILY: ${GNSS_RECEIVER_FAMILY:-}
      GNSS_TRANSPORT: ${GNSS_TRANSPORT:-}
      GNSS_SERIAL_DEVICE: ${GNSS_SERIAL_DEVICE:-}
      GNSS_SERIAL_BAUD: ${GNSS_SERIAL_BAUD:-}
      GNSS_FRAME_ID: ${GNSS_FRAME_ID:-}
      GNSS_NTRIP_ENABLED: ${GNSS_NTRIP_ENABLED:-}
      GNSS_NTRIP_HOST: ${GNSS_NTRIP_HOST:-}
      GNSS_NTRIP_PORT: ${GNSS_NTRIP_PORT:-}
      GNSS_NTRIP_MOUNTPOINT: ${GNSS_NTRIP_MOUNTPOINT:-}
      GNSS_NTRIP_USERNAME: ${GNSS_NTRIP_USERNAME:-}
      GNSS_NTRIP_PASSWORD: ${GNSS_NTRIP_PASSWORD:-}
      GNSS_NTRIP_GGA_ENABLED: ${GNSS_NTRIP_GGA_ENABLED:-}
      GNSS_NTRIP_GGA_INTERVAL_S: ${GNSS_NTRIP_GGA_INTERVAL_S:-}
    volumes:
      - /dev:/dev
      - ./docker/config/mowgli:/config:ro
      - ./docker/config/cyclonedds.xml:/cyclonedds.xml:ro

    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m
