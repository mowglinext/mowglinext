  # -------------------------------------------------------------------------
  # LiDAR driver — LD06/LD14/LD19 on hardware UART, publishes /scan (LaserScan)
  #
  # Replace this service with a different driver image if you use a different
  # LiDAR (e.g., rplidar, sllidar), as long as it publishes /scan.
  # -------------------------------------------------------------------------

x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  CYCLONEDDS_URI: file:///cyclonedds.xml
  ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

services:

  lidar:
    container_name: mowgli-lidar
    image: ${LIDAR_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    environment:
      <<: *ros2-env
    # No command override — image CMD (/start_lidar.sh) launches Myzhar's
    # ldrobot-lidar-ros2 lifecycle component via /ldlidar_scan.launch.py
    # with fixed scan length from /ldlidar.yaml (hardcoded /dev/lidar @ 230400).
    volumes:
      - /dev:/dev
      - ./docker/config/cyclonedds.xml:/cyclonedds.xml:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m
