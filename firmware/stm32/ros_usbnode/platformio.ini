#     `#ifdef BLADEMOTOR_USART_ENABLED` block defines a BLADEMOTOR_USART instance
#     ONLY for the 500 ORIG/B variants, so the LUV path currently has none.
# Blocked on HARDWARE INFO (being sourced from the user separately). Do NOT add a
# guessed [env:LUV1000RI] — a wrong MCU/pinout would brick or misflash the board.