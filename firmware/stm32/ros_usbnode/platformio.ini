; PlatformIO Project Configuration File

[platformio]
default_envs = Yardforce500

[env]
platform = ststm32
framework = stm32cube
build_src_filter =
	+<*>
	-<.git/>
	-<.svn/>
	-<proxy_inc/**/*.c>
	-<proxy_inc/**/*.S>
	-<ros/ros_lib_backup_*>
	-<ros/ros_lib/**>
	-<ros/ros_lib>

[env:Yardforce500]
board = genericSTM32F103VC
platform_packages =
	toolchain-gccarmnoneeabi@~1.90301.0
	platformio/tool-stm32duino@^1.0.1
	platformio/tool-openocd@^2.1100.211028
	platformio/tool-dfuutil@^1.11.0
build_flags = -DBOARD_YARDFORCE500_VARIANT_ORIG=1 -Wl,--undefined,_printf_float -O2 -Isrc/ros/ros_custom -Iinclude
extra_scripts =
	pre:git_build_id.py
	pre:patch_usb.py
	pre:add_swo_viewer.py
debug_tool = stlink
upload_protocol = stlink
monitor_speed = 115200
monitor_port = /dev/ttyAMA0

[env:Yardforce500_STLINK_V3]
extends = env:Yardforce500
upload_protocol = custom
upload_command = /usr/bin/openocd -f interface/stlink.cfg -f target/stm32f1x.cfg -c "program .pio/build/Yardforce500_STLINK_V3/firmware.elf verify reset exit"

[env:Yardforce500B]
board = genericSTM32F401VC
platform_packages =
	toolchain-gccarmnoneeabi@~1.90301.0
	platformio/tool-stm32duino@^1.0.1
	platformio/tool-openocd@^2.1100.211028
	platformio/tool-dfuutil@^1.11.0
	platformio/framework-stm32cubef4@^1.26.2
build_flags = -DBOARD_YARDFORCE500_VARIANT_B=1 -Wl,--undefined,_printf_float -O2 -Isrc/ros/ros_custom -Iinclude -DHSE_VALUE=8000000u
extra_scripts =
	pre:git_build_id.py
	pre:patch_usb.py
	pre:add_swo_viewer.py
debug_tool = stlink
upload_protocol = stlink
monitor_speed = 115200
monitor_port = /dev/ttyAMA0

[env:Yardforce500B_STLINK_V3]
extends = env:Yardforce500B
upload_protocol = custom
#upload_command = /usr/bin/openocd -f interface/stlink.cfg -f target/stm32f4x.cfg -c "program .pio/build/Yardforce500B_STLINK_V3/firmware.elf verify reset exit"
upload_command = /usr/bin/openocd -f interface/stlink.cfg -f target/stm32f4x.cfg -c "adapter speed 100" -c "reset_config srst_only srst_nogate connect_assert_srst" -c "program .pio/build/Yardforce500B_STLINK_V3/firmware.elf verify reset exit"

[env:Yardforce500_REMOTE_UPLOAD]
board = genericSTM32F103VC
build_flags = -DBOARD_YARDFORCE500_VARIANT_ORIG=1 -Wl,--undefined,_printf_float -Isrc/ros/ros_custom -Iinclude
extra_scripts = raspi_remote_upload.py
custom_mowgli_host = 10.146.111.222
custom_mowgli_user = ubuntu

