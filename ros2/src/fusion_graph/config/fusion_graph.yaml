# ---------------------------------------------------------------------------
# fusion_graph_node — factor-graph localizer parameters
# ---------------------------------------------------------------------------
# See docs/HANDOFF_FUSION_GRAPH.md for the design rationale.

fusion_graph_node:
  ros__parameters:
    # ── Graph cadence ──────────────────────────────────────────────────
    # 50 Hz default. Earlier 25 Hz (0.04) was technically sufficient for
    # the 5 Hz controller queries, but the operator could see a 5-10°
    # yaw lag in the GUI during in-place pivots (gyro_z is 91 Hz on
    # /imu/data but fusion only republished its absorbed value every
    # 40 ms, layered with 80-100 ms of rosbridge + WebSocket + render
    # latency downstream). Bumping the optimiser to 50 Hz halves the
    # fusion-side contribution to that lag at modest CPU cost (iSAM2
    # incremental updates are sub-millisecond on this graph size).
    # If CPU pressure becomes visible (Nav2 controller frequency
    # tanks, ekf_odom_node misses cycles), drop back to 0.03 (33 Hz).
    # Override key (set by navigation.launch.py): fusion_graph_node_period_s.
    node_period_s: 0.02

    # ── Wheel between-factor noise ─────────────────────────────────────
    # Per-node sigmas in body frame. wheel_sigma_y << wheel_sigma_x is
    # the non-holonomic constraint: the robot doesn't slide sideways.
    wheel_sigma_x: 0.05         # m
    wheel_sigma_y: 0.005        # m — tight non-holo
    wheel_sigma_theta: 0.01     # rad — used only when no gyro this tick

    # ── Gyro yaw between-factor noise ──────────────────────────────────
    # Used when at least one IMU sample arrived between nodes. Much
    # tighter than wheel-derived yaw on a differential drive (the
    # encoders see ~5-10 cm of slip per turn).
    gyro_sigma_theta: 0.005     # rad per node

    # Stationary-yaw drift suppressor (added 2026-05-03, iterated same
    # day after on-robot measurement showed the AND-gated version drove
    # yaw -4.28°/min vs +0.43°/min unsuppressed — live IMU residual wz
    # is ~-1.32°/s, well above any sensible gyro stationary threshold,
    # so the AND was always false). The gate is now wheel-only: when
    # the per-tick wheel accumulator (|dx|, |dy|, |dtheta_wheel|) is
    # under these thresholds, the BetweenFactor uses dtheta=0 with
    # stationary_sigma_theta regardless of gyro noise. Encoders cannot
    # slip into stationary, so a zero wheel reading is treated as
    # ground truth.
    stationary_thresh_xy_m: 0.001
    stationary_thresh_theta: 0.002
    # 2026-05-27: relax 0.001 → 0.01 rad. The original tight value gave
    # the wheel between-factor's yaw component a precision of 1e6, which
    # — combined with the wheel non-holo σ_y=0.005m (precision 4e4) and
    # tight GPS lever-arm factors (σ~3-5mm → precision 4e4-1e5) during
    # the slow-pivot phase of docking — pushed iSAM2's Cholesky onto
    # a near-singular information matrix and triggered
    # IndeterminantLinearSystemException. The crash was reliably
    # reproducible during DockRobot's rotate-to-dock alignment, where
    # the wheel reports "stationary" (snap dθ=0 with this σ) while the
    # gyro between-factor wants a non-zero dθ from chassis vibration
    # under sub-deadband motor PWM. 0.01 rad gives Cholesky two extra
    # orders of magnitude of conditioning slack while still pinning yaw
    # tighter than the gyro alone (gyro_sigma_theta=0.005 rad). Cost:
    # ~×3 yaw drift over a long idle window (still under 1°/min).
    # If LiDAR is enabled, scan_between factors break the wheel-only
    # constraint colinearity and this relaxation can be tightened again.
    stationary_sigma_theta: 0.01

    # ── Pivot-mode wheel-translation downweight ───────────────────────
    # When |per-tick gyro dtheta| exceeds pivot_gate_dtheta_rad, the
    # wheel between-factor uses pivot_wheel_sigma_x instead of
    # wheel_sigma_x. Mitigates the phantom forward vx that diff-drive
    # encoders report during fast in-place rotation (motor deadband on
    # the backward-running wheel makes it under-magnitude its tick
    # count; the diff-drive arithmetic then produces a same-sign vx
    # bias in BOTH CW and CCW spins — measured at ~+0.025 m/s on
    # 2026-05-14 with a 1 rad/s spin, drifting fusion's base_link by
    # 0.2-0.4 m per spin and tripping Nav2 replans).
    # Default 0.012 rad/tick = 0.3 rad/s at 25 Hz; pivot_wheel_sigma_x
    # 0.5 m effectively releases the X constraint without disconnecting
    # the graph (sigma_y stays tight so non-holo is preserved).
    pivot_gate_dtheta_rad: 0.012
    pivot_wheel_sigma_x: 0.5

    # ── Stationary multi-source gate ───────────────────────────────────
    # If the wheel says we're stationary but |gyro_z| stays above this
    # threshold, the robot is being externally rotated (hand-pushed off
    # the dock, lifted while spinning) and the encoders don't see it.
    # Skip the dθ=0 snap in that case. 0.10 rad/s ≈ 5.7°/s sits above
    # the typical post-cal gyro residual (~0.02-0.03 rad/s) and below
    # any meaningful manual rotation.
    stationary_gyro_thresh_rad_per_s: 0.10

    # ── Slip veto (wheel translation rejected when gyro contradicts) ─
    # See graph_manager.cpp Tick() for the full rationale. The triple
    # gate fires when the wheels claim rotation that the chassis gyro
    # doesn't see — on wet grass the drive wheels can spin in unison,
    # producing encoder readings that say "I moved forward and turned"
    # while the chassis sits still. Treat the wheel (dx, dy) as a lie
    # in that case; the gyro still feeds the yaw and GPS / scans pull
    # (x, y). All three thresholds are *per-tick* radians so they
    # scale with node_period_s automatically.
    slip_residual_thresh_rad: 0.01    # |wheel_dθ − gyro_dθ| limit (≈14°/s @25 Hz)
    slip_gyro_max_rad: 0.005          # gyro must read near-still
    slip_wheel_min_rad: 0.005         # wheel must claim non-trivial rotation

    # ── Sliding-window cap on the factor graph ───────────────────────
    # RebaseISAM2 keeps only the most-recent max_graph_nodes pose nodes
    # and drops the rest (their constraints were already folded into the
    # kept priors, so the current estimate is unchanged). Without the
    # cap the graph grew unbounded — 48,000+ nodes were observed in the
    # field, which inflated marginal-covariance cost until cov_xx hit
    # ~1 m and the map→odom estimate started jumping metres while the
    # robot sat still. Set to 0 to restore legacy keep-everything.
    #
    # 2026-06-04: raised 3000 → 6000. Loop closure was structurally dead
    # with 3000: FindLoopClosureCandidates requires a candidate that is
    # BOTH ≥ lc_min_age_s old AND still has a pose in the graph
    # (HasPoseAt). The age gate in node-indices is ceil(lc_min_age_s /
    # node_period_s); with the old lc_min_age_s=600 @ 0.04 s that was
    # 15000 indices, but poses are pruned after max_graph_nodes=3000, so
    # any age-eligible node had already been dropped → candidate set
    # always empty → loop_closures stuck at 0 forever (confirmed on-robot
    # 2026-06-04: 153 578 total nodes, 0 loop closures, 0 log lines). For
    # loop closure to EVER fire the pose window must outlast the age gate:
    # 6000 nodes ≈ 4 min @ 25 Hz vs the new lc_min_age_s=30 (≈ 750
    # indices), leaving a ~5000-node band of revisitable candidates.
    max_graph_nodes: 6000

    # ── Loop-closure candidate age gate ──────────────────────────────
    # A node must be at least this many seconds old to be a loop-closure
    # candidate (FindLoopClosureCandidates, converted to node-indices via
    # node_period_s). MUST stay well under max_graph_nodes·node_period_s
    # or loop closure can never fire (see the max_graph_nodes note). The
    # node's declare default is 600 s, which silently disabled the feature
    # under the 3000-node window. 30 s ≈ 750 indices @ 25 Hz — long enough
    # to skip the just-visited neighbours, short enough that a
    # boustrophedon swath turnaround (adjacent swath ~30-90 s earlier,
    # within lc_max_dist_m=5 m) registers as a revisit.
    #
    # The earlier claim that the stationary throttle + lc_max_candidates=3 bound
    # dock-IDLE closures was WRONG: a long mowing session leaves thousands of
    # nearby nodes, and a robot parked among them loop-closes every new stationary
    # node against fresh candidates indefinitely → unbounded iSAM2 factor growth
    # that OOM-killed the node 2026-06-09. The real bound is now
    # lc_skip_when_rtk_fixed (below) + the max_graph_nodes window restriction in
    # FindLoopClosureCandidates — NOT this age gate. Keep lc_min_age_s=30 so LC
    # still fires within the window during genuine RTK-Float (tree-cover) windows.
    lc_min_age_s: 30.0

    # Skip loop-closure GENERATION while an RTK-Fixed sample is fresh (within
    # scan_yield_timeout_s). Under RTK-Fixed the GPS factor is already absolute
    # and mm-accurate, so each LC adds an iSAM2 factor for ~no information — an
    # unbounded leak over a long stationary dwell (dock IDLE / charging). This is
    # the primary fix for the 2026-06-09 OOM. LC re-enables once the fix goes
    # stale, so no-fix windows still get global consistency. Default true.
    lc_skip_when_rtk_fixed: true

    # ── Online gyro bias estimation (item #3, pragmatic) ─────────────
    # During wheel-only stationary windows, EMA-update an estimate of
    # gyro_z bias and subtract it from raw samples before integration.
    # Captures thermal drift over a session without a graph schema
    # change. Set to false to use only the offline bias from
    # hardware_bridge_node's docking calibration.
    gyro_bias_estimation_enabled: true
    gyro_bias_ema_tau_s: 30.0
    gyro_bias_max_sample_rad_per_s: 0.10

    # ── Full IMU preintegration (joint bias optim, item #3 final) ────
    # When true, replaces the EMA bias path with a per-node bias
    # variable in the graph and a GyroPreintFactor on each pose pair.
    # iSAM2 jointly optimises trajectory + bias. Higher quality yaw
    # tracking (especially during long motion windows where the EMA
    # path can't update) at the cost of more graph state.
    # Default false until field-validated; flip to true to opt in.
    use_imu_preint: false
    gyro_noise_density_rad_per_s: 0.015
    gyro_bias_rw_rad_per_s: 0.001
    gyro_bias_prior_sigma_rad_per_s: 0.05

    # ── Adaptive process noise on wheel σ_x ────────────────────────────
    # Inflates wheel_sigma_x when the |dtheta_wheel - dtheta_gyro|
    # residual EMA exceeds the floor. Slip on wet grass / slope causes
    # encoders to over-report distance — without inflation the
    # iSAM2 wheel between-factor pins the trajectory to that bogus
    # delta until a GPS observation pulls it back. Set gain to 0 to
    # disable. See GraphParams comments for sizing details.
    adaptive_noise_enabled_gain: 10.0
    adaptive_noise_ema_tau_s: 0.5
    adaptive_noise_residual_floor_rad: 0.005

    # ── Mobile RTK wrong-fix detection ────────────────────────────────
    # Compare each GNSS jump against the LAST ACCEPTED GNSS reference,
    # not the most-recent raw sample. Raw GNSS cadence is still tracked
    # separately for diagnostics. The motion budget is accumulated since
    # the last accepted fix:
    #   expected_motion = max(wheel_delta_since_accepted,
    #                         cmd_delta_since_accepted)
    #   noise_budget    = gps_sigma_xy * rtk_wrongfix_gps_sigma_multiplier
    #   allowed_delta   = expected_motion + noise_budget + margin
    #   innovation      = |delta_gps_m - expected_motion|
    #
    # Small innovations are accepted, medium ones are DOWNWEIGHTED
    # (inflated GNSS sigma in the factor), and only strong outliers are
    # rejected as mobile wrong-fixes. This avoids the old brittle fixed
    # 20 mm wheel-motion gate, which failed during real mowing because
    # the robot legitimately travels ~40 mm between 5 Hz fixes at
    # 0.20 m/s.
    rtk_wrongfix_gps_sigma_multiplier: 2.0
    rtk_wrongfix_min_margin_m: 0.01
    rtk_wrongfix_downweight_innovation_multiplier: 2.0
    rtk_wrongfix_downweight_sigma_multiplier: 4.0

    # ── ICP scan-match guard rails ─────────────────────────────────────
    # Applied to every scan_matcher_->Match result before queueing it
    # as a graph factor. See fusion_graph_node.hpp comments for the
    # physical rationale. Tune up (relax) if scan_matches_fail spikes
    # on otherwise-OK outdoor matches; tune down (tighten) if degenerate
    # matches corrupt iSAM2 trajectory.
    icp_max_rmse_m: 0.10
    icp_max_delta_xy_m: 0.30
    icp_max_delta_theta_rad: 0.50
    icp_max_divergence_xy_m: 0.15
    icp_max_divergence_theta_rad: 0.35

    # ── GPS unary noise floor ──────────────────────────────────────────
    # Below this sigma, NavSatFix.covariance is treated as unrealistic
    # and clamped. RTK-Fixed reports σ ~3 mm; below that is numerical
    # noise.
    gps_sigma_floor: 0.003      # m

    # ── Initial-pose prior ─────────────────────────────────────────────
    # Loose enough that the first GPS unary dominates immediately.
    prior_sigma_xy: 0.05        # m
    prior_sigma_theta: 0.05     # rad

    # ── GPS antenna lever-arm in base_footprint frame ─────────────────
    # Read from mowgli_robot.yaml's gps_x / gps_y at launch time and
    # passed in here. These defaults are placeholders.
    lever_arm_x: 0.0            # m, forward
    lever_arm_y: 0.0            # m, left

    # ── Datum (set by launch from mowgli_robot.yaml) ──────────────────
    datum_lat: 0.0
    datum_lon: 0.0

    # ── Frame names ───────────────────────────────────────────────────
    map_frame: map
    odom_frame: odom
    base_frame: base_footprint

    # ── High-rate extrapolated pose (item #15) ────────────────────────
    # When > 0, fusion_graph_node publishes /odometry/filtered_map_fast
    # at this rate (Hz), with yaw projected forward from the latest
    # iSAM2-published pose using the most recent IMU gyro_z sample.
    # Off by default (0) — opt in from yaml when display latency is
    # the bottleneck (e.g. operator GUI during pivots). Consumers that
    # need precise pose for control should keep using
    # /odometry/filtered_map at 50 Hz.
    fast_pose_publish_rate_hz: 0.0

    # ── TF publish lead time ──────────────────────────────────────────
    # Default 0.0 = HARDWARE-correct (no forward extrapolation).
    # sim_full_system.launch.py overrides to 0.1 because under
    # sim_time, Nav2 controller lookups would otherwise fall 1-3 ms
    # ahead of the latest publish and throw ExtrapolationException,
    # freezing cmd_vel publication. On real hardware the same race
    # occurs during RotationShimController PRE_ROTATE: both the RSC
    # and fusion_graph run at 10 Hz with no phase alignment, so the
    # controller's clock regularly lands 10-50 ms ahead of the latest
    # TF stamp and throws ExtrapolationException, collapsing cmd_vel
    # throughput to ~2 Hz and stalling PRE_ROTATE indefinitely.
    # 50 ms lead: max yaw artifact = 0.05 s × 0.75 rad/s ≈ 1.4°,
    # well within FTC's heading PID correction range. Override key
    # (set by navigation.launch.py): fusion_graph_tf_lead_s.
    tf_publish_lead_s: 0.05

    # ── Decoupled TF broadcast rate ──────────────────────────────────
    # map→odom + odom→base_footprint are broadcast from a dedicated
    # thread at this rate, immune to executor stalls (iSAM2 Tick on a
    # large graph or the 1 Hz diagnostics GetAllPoses sweep can block
    # the executor 150-250 ms on a loaded Pi — field 2026-06-07: Nav2
    # threw ExtrapolationException even after its 100 ms transform
    # timeout, RotationShim aborted ~19×/90 s and the robot twitched
    # in place instead of following paths). 20 Hz halves the
    # worst-case TF staleness vs the 25 Hz tick cadence and, combined
    # with tf_publish_lead_s, keeps lookups in interpolation
    # territory. <= 0 disables the thread (inline OnTimer publishing,
    # pre-2026-06 behavior).
    tf_broadcast_rate_hz: 20.0

    # ── Dock-approach pose stabilisation ─────────────────────────────
    # While the docking server runs its final graceful approach it
    # publishes /cmd_vel_docking; we treat a non-zero command within
    # docking_active_timeout_s as "approach in progress". During that
    # window the slow REVERSE motion makes the COG travel-direction yaw
    # noise-dominated, and the RTK fixed↔float per-epoch flicker jolts
    # position — both jolt the fused pose, which the graceful controller
    # chases into divergence (field 2026-06-10: drove 38→146 cm away,
    # ω saturating ±0.85). So during the approach we drop the COG yaw
    # factor (gyro carries yaw) and reject non-Fixed GPS epochs (hold
    # position through the flicker). Set either gate false to disable.
    docking_active_timeout_s: 1.0
    gate_cog_during_docking: true
    gate_float_gps_during_docking: true

    # ── Dock-pose hold while charging (D1 fix) ───────────────────────
    # While is_charging, re-assert a firm absolute anchor at the FULL
    # dock_pose (x,y,yaw) once per new node, instead of the old weak
    # live-GPS factor. The live-GPS approach walked the docked pose off
    # the anchor (field 2026-06-10: 11.5 cm + 53° over a charge dwell,
    # because a ~7 Hz σ=0.5 m GPS stream out-voted the one-shot dock prior
    # and nothing held yaw) — which made re-docking aim at the wrong
    # target. The per-node dock anchor pins position AND yaw and keeps
    # iSAM2 well-posed with no GPS to drag it. sigma_xy small so it
    # dominates; yaw σ from dock_pose_yaw_sigma_rad.
    dock_reanchor_sigma_xy_m: 0.03

    # ── RTK-anchored keyframe map (scan-to-keyframe absolute localization) ──
    # The mechanism for holding <2 cm absolute DURING RTK-Float windows. Under
    # stable RTK-Fixed, freeze {GPS-fused pose, scan} keyframes (the absolute
    # map). During Float, ICP-match the live scan to nearby keyframes and pin
    # absolute xy with a PoseTranslationPrior — bounding error to ~keyframe ⊕ ICP
    # instead of letting dead-reckoning drift. REQUIRES use_scan_matching:=true
    # (reuses the scan matcher + subscription + ICP guard rails) and LiDAR. Only
    # delivers <2 cm where the LiDAR sees stable structure (fence/tree/dock);
    # open lawn degrades to dead-reckoning by design. Default OFF — field-validate
    # with the GPS-off coast-drift probe before enabling.
    use_keyframe_map: false
    # Capture gates (build the map):
    kf_capture_sigma_max_m: 0.01    # only capture when the fix is mm-accurate
    kf_capture_rtk_debounce: 3      # consecutive RTK-Fixed epochs before a capture
    kf_capture_max_omega: 0.10      # rad/s — skip capture while pivoting (smeared scan)
    kf_spacing_m: 0.5               # min spacing between keyframes (also store decimation)
    max_keyframes: 2000             # hard cap (oldest evicted)
    # Apply gates (use the map during Float):
    kf_match_max_dist_m: 3.0        # keyframe search radius around the predicted pose
    kf_max_candidates: 5
    kf_apply_sigma_floor_m: 0.02    # floor on the absolute-prior σ (never overclaim)
    kf_engage_age_s: 0.3            # engage apply once RTK-Fixed is older than this
