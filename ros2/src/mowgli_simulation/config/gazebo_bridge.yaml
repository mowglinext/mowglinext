# gazebo_bridge.yaml
#
# ros_gz_bridge parameter file for the Mowgli simulation.
# Maps Gazebo Ignition topics to/from ROS2 topics.
#
# direction convention:
#   ROS_TO_GZ  — ROS2 publisher → Gazebo subscriber
#   GZ_TO_ROS  — Gazebo publisher → ROS2 subscriber
#   BIDIRECTIONAL — both directions

- ros_topic_name: /cmd_vel
  gz_topic_name: /cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ

- ros_topic_name: /wheel_odom_raw
  gz_topic_name: /odom
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: GZ_TO_ROS
  # sim_wheel_slip.py relays /wheel_odom_raw → /wheel_odom and injects
  # ~5 cm/s longitudinal-velocity bias for ~1 s every 30 s. The EKF
  # only fuses twist (vx, vy) from this topic, so the slip events show
  # up as transient encoder/GPS divergence the way a real wheel slip
  # on grass would.

- ros_topic_name: /scan
  gz_topic_name: /scan
  ros_type_name: sensor_msgs/msg/LaserScan
  gz_type_name: gz.msgs.LaserScan
  direction: GZ_TO_ROS

# Gazebo's IMU plugin emits a noiseless, perfectly-calibrated stream.
# We rebroadcast it here on /imu/data_gz; sim_imu_noise.py
# (mowgli_simulation) republishes on /imu/data with realistic gyro/accel
# bias-random-walk + white noise.
- ros_topic_name: /imu/data_gz
  gz_topic_name: /imu/data_raw
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: gz.msgs.IMU
  direction: GZ_TO_ROS

# Gazebo's NavSat plugin always emits status.status=STATUS_FIX (0). The
# production GPS pipeline gates on STATUS_GBAS_FIX (4) for RTK-Fixed
# quality, so we publish to /gps/fix_raw and let sim_navsat_rtk_fix.py
# (mowgli_simulation) republish on /gps/fix with the status promoted.
- ros_topic_name: /gps/fix_raw
  gz_topic_name: /gps/fix
  ros_type_name: sensor_msgs/msg/NavSatFix
  gz_type_name: gz.msgs.NavSat
  direction: GZ_TO_ROS

- ros_topic_name: /joint_states
  gz_topic_name: /joint_states
  ros_type_name: sensor_msgs/msg/JointState
  gz_type_name: gz.msgs.Model
  direction: GZ_TO_ROS

# NOTE: /tf is NOT bridged — Gazebo's diff-drive publishes odom→base_link
# which conflicts with ekf_odom_node's odom→base_footprint, causing pose
# flickering. All TF is handled by robot_state_publisher and
# robot_localization (ekf_odom_node + ekf_map_node) from navigation.launch.py.

- ros_topic_name: /clock
  gz_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS
