# Nav2 parameters for Mowgli outdoor robot mower — SHARED BASE.
#
# This file holds everything COMMON to the LiDAR and no-LiDAR variants. It is
# NOT loaded alone: navigation.launch.py deep-merges it with exactly one
# overlay — nav2_params_lidar.yaml or nav2_params_no_lidar.yaml — chosen by the
# use_lidar arg. The overlays carry ONLY genuine differences (costmap obstacle
# vs static layers, scan-based vs pass-through collision_monitor, FollowPath
# collision detection). Edit shared params HERE so the two variants cannot
# drift; edit variant-specific params in the matching overlay.
#
# Controller:   FollowPath           = RotationShim + RegulatedPurePursuit (transit)
#               FollowCoveragePath   = RotationShim + MPPI on the continuous
#                                      CC-Dubins coverage path (Follow-the-Carrot retired)
# Planner:      nav2_smac_planner/SmacPlanner2D.
# Coverage:     F2C v2 path from mowgli_coverage, followed by MPPI.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    # 1000 ms (was 60 ms). The earlier "not sluggish" tuning broke HOME:
    # IsPathValid (in our custom navigate_to_pose.xml replan-only-if-invalid
    # tree) calls planner_server's is_path_valid service at 1 Hz; that
    # service shares planner_server's default mutually-exclusive callback
    # group with ComputePathToPose + costmap updates, so its response can
    # easily exceed 60 ms on ARM. The timeout then surfaces as
    # "is_path_valid service client: async_send_request failed", which
    # propagates as a BT exception and aborts NavigateToPose →
    # docking_server's nav-to-staging-pose fails (error 903) → DockRobot
    # aborts → HOME falls back to IDLE. 1 s only matters when a service is
    # genuinely broken; healthy responses are single-digit ms either way.
    default_server_timeout: 1000
    # Default is 1.0 s — observed on ARM that planner_server / controller_server
    # finish lifecycle transition to active before bt_navigator but their
    # action servers (compute_path_to_pose / follow_path) are not fully
    # registered in the DDS graph yet, so bt_navigator's BT creation fails
    # with "action server not available" and lifecycle_manager aborts
    # bring-up. 10 s is cheap insurance; it only waits longer on startup.
    wait_for_service_timeout: 10000
    # Custom Nav2 BT that adds GoalCheckerSelector (required when multiple
    # goal_checker_plugins are configured in controller_server).
    # Paths are injected by navigation.launch.py via RewrittenYaml — keep empty here.
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""
    # plugin_lib_names: auto-loaded in Kilted — no manual list needed.
    enable_stamped_cmd_vel: true

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# ---------------------------------------------------------------------------
# Controller server
# ---------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    # Velocity-feedback source for the controllers — MPPI reads current speed
    # from here to seed its trajectory rollouts, RPP for its velocity-scaled
    # lookahead. MUST be set: the nav2 default is "odom", but nothing publishes
    # /odom on this robot (the wheel odometry is /wheel_odom), so leaving the
    # default gave both controllers ZERO velocity feedback — MPPI planned every
    # cycle as if stationary (circling on tight coverage) and RPP's lookahead
    # collapsed to its minimum (transit weaving). Use /wheel_odom (raw, carries
    # angular velocity); the fused /odometry/filtered currently reports
    # twist.angular.z = 0 (separate fusion gap, so it is NOT usable here yet).
    odom_topic: /wheel_odom
    # 10 Hz: 0.3 m/s × 100 ms = 3 cm of motion between decisions, matches
    # the 5-10 Hz upstream costmap / GPS refresh. Dropped from 20 Hz
    # because the ARM host was chronically missing the 20 Hz loop rate
    # (10-25 Hz jittery), which hurts FTC tracking more than the lower
    # nominal frequency does.
    controller_frequency: 10.0
    # Top-level transform_tolerance is used by controller_server when
    # transforming the global plan into the costmap frame (separate from
    # each plugin's own transform_tolerance, which only covers the
    # plugin-internal pose lookups). Nav2 default is 0.1 s, which is
    # tighter than our 25 Hz map→odom publish gap (~40 ms) once you add
    # ARM scheduler jitter; controller_server then throws "Lookup would
    # require extrapolation into the future" mid-FollowPath and Nav2
    # aborts the action with error_code 102. 0.5 s gives ~12 fusion_graph
    # periods of headroom — well past the worst-case stamp drift we have
    # seen in the field (35-80 ms).
    controller.transform_tolerance: 0.5
    # 5s vs 0.3s default — ARM scheduler jitter can stall local_costmap
    # updates 2-3s under load; the controller would error out otherwise.
    costmap_update_timeout: 5.0
    # min_*_velocity_threshold disabled — hardware_bridge now has a
    # closed-loop deadband compensator (PR #228) that boosts stalled
    # motors to the firmware ~PWM 40 deadband. Leaving these at the old
    # 0.08 / 0.001 floors would zero MPPI's ramp-up commands before
    # they reach hardware_bridge, so the compensator never sees them and
    # the robot stays parked even though the controllers asked it to
    # move. Field-observed 2026-05-17 on CMD=2 HOME: MPPI raw output
    # ≈ (0.05, 0.01) was getting clamped to (0.00, 0.01) by these
    # filters, leaving the wheels in deadband.
    min_x_velocity_threshold: 0.0
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.0
    failure_tolerance: 1.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["stopped_goal_checker", "coverage_goal_checker"]
    controller_plugins: ["FollowPath", "FollowCoveragePath"]

    progress_checker:
      # PoseProgressChecker counts rotation as progress: headland corners
      # involve extended pivot-in-place where the chassis hardly translates.
      # SimpleProgressChecker fired "Failed to make progress" mid-pivot
      # even with 90 s allowance.
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.15
      required_movement_angle: 0.5     # rad (~28°), gates corner pivots
      movement_time_allowance: 30.0

    stopped_goal_checker:
      plugin: "nav2_controller::StoppedGoalChecker"
      trans_stopped_velocity: 0.10
      xy_goal_tolerance: 0.30
      # 0.10 rad (≈5.7°), was 0.5 rad (≈28.6°). The loose value let
      # opennav_docking's NavigateToPose-to-staging-pose phase report
      # SUCCESS even when FTC had stopped with the chassis 20-25° off
      # the dock-approach axis. The graceful approach controller then
      # had to redress while driving forward — "en biais" docking. With
      # 1.5 m of straight-line approach (staging_x_offset: -1.5) the
      # robot still misses the cradle if it enters that corridor more
      # than ~10° off. 0.10 rad forces FTC to keep rotating in place at
      # the end of NavigateToPose until the heading is close enough to
      # drive straight into the dock. Slightly longer arrivals on
      # ordinary transit are an acceptable trade.
      yaw_goal_tolerance: 0.10

    # Coverage strip endpoint validation.
    #
    # PathProgressGoalChecker (mowgli_nav2_plugins) — subscribes to
    # FTC's republished `<plugin_name>/global_plan` and only fires when
    # the robot has monotonically tracked >= `progress_threshold` of
    # the path's poses AND is within xy/yaw tolerance of the goal pose.
    #
    # Why: SimpleGoalChecker and StoppedGoalChecker both fire on
    # proximity-to-goal alone (the latter also gates on velocity, but
    # FTC's PRE_ROTATE pivots in place with lin_vel≈0 — the velocity
    # gate matches mid-traversal). F2C coverage paths can end near the
    # perimeter, where the robot also passes during headland mowing.
    # We measured FollowPath actions completing at <2 % coverage with
    # both legacy checkers. Gating on PATH PROGRESS (idx ≥ 95 % of the
    # plan size) is the only definition of "done" that survives a
    # coverage path whose start and end are both inside the headland
    # ring.
    #
    # plan_topic must match the controller publishing the plan we
    # follow — FTC publishes on `<plugin_name>/global_plan`, so for
    # the FollowCoveragePath slot the full path is
    # `/controller_server/FollowCoveragePath/global_plan`.
    coverage_goal_checker:
      plugin: "mowgli_nav2_plugins/PathProgressGoalChecker"
      progress_threshold: 0.95
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.30
      plan_topic: "/controller_server/FollowCoveragePath/global_plan"

    # FollowPath (transit / dock approach / home / undock recovery) —
    # MPPI. FTC was the wrong tool for transit: it has a rigid state
    # machine (PRE_ROTATE / FOLLOWING / WAITING_FOR_GOAL_APPROACH /
    # POST_ROTATE), rejects plans with fewer than 3 poses, and aborts
    # the action when the lateral residual exceeds
    # `max_goal_distance_error` even by millimeters. Combined with the
    # firmware PWM deadband on the wheels, the result was the robot
    # getting stuck during opennav_docking's nav-to-staging-pose phase
    # whenever it was already near staging (the planner emits a 2-pose
    # direct line → FTC cancels → action server retries forever).
    #
    # MPPI was tried in PR #224 but field-measured 2026-05-17 it consistently
    # emitted ~0.012 m/s cmd_vx for a 3 m navigation — below the firmware
    # deadband — leaving the robot parked. Root cause not isolated (cost
    # critics behaving conservatively on the ARM SoC budget, possibly the
    # combination of small batch_size / short horizon / dense path). MPPI
    # demands more tuning effort than is justified for transit when simpler
    # controllers exist.
    #
    # RotationShimController wraps RegulatedPurePursuitController (RPP):
    #   * RotationShim detects when the next path segment requires a yaw
    #     change > rotate_to_heading_min_angle and does a pure pivot
    #     FIRST, then hands off — solves the "FTC PRE_ROTATE / FTC
    #     fights MPPI's mixed cmds" problem. Pivot phase outputs pure-wz,
    #     translation phase outputs pure-vx+small-wz (via RPP).
    #   * RPP is curvature-driven pure pursuit with regulated speed:
    #     plans a lookahead carrot, computes the steering curvature,
    #     scales down vx based on lookahead distance + curvature + nearby
    #     costs. Smooth, well-understood, low-CPU.
    #   * Both accept any plan length, including 2-pose direct lines
    #     (RPP samples by distance, not pose index).
    #
    # Transit uses RPP (this slot); the coverage slot (FollowCoveragePath)
    # uses MPPI — RPP's lookahead-carrot tracking doesn't hold the < 10 mm
    # lateral precision the swath tiling needs.
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # --- RotationShim params ---
      # 0.785 rad (45°) — under this, hand straight to RPP. Above, pivot
      # in place first. Matches the threshold that opennav_docking's
      # NavigateToPose typically generates at long-transit endpoints.
      angular_dist_threshold: 0.785
      forward_sampling_distance: 0.5
      # 0.75 (was 0.6) + accel 2.5 (was 1.0): the in-place pivot used to ramp
      # 0→0.6 at 1.0 rad/s² (~0.6 s), spending most of the ramp BELOW the
      # firmware pivot deadband (~0.5 rad/s) so the hardware_bridge closed-loop
      # wound up then kicked → jerky pivot start (user 2026-05-28; mowing turns
      # are smooth because FTC uses its own PRE_ROTATE profile, not this ramp).
      # Snapping to a decisive 0.75 rad/s clears the deadband margin and the
      # closed-loop holds it smoothly.
      rotate_to_heading_angular_vel: 0.75
      max_angular_accel: 2.5
      simulate_ahead_time: 1.0
      # Pivot ONCE at the start of each transit, then hand to the primary
      # controller — do NOT re-engage the in-place rotate mid-path. The transit
      # plan is FROZEN (never replanned from the current pose) and RotationShim
      # samples its target 0.5 m from poses.front() (the plan START). Once the
      # robot drives off poses.front(), a re-engaged shim/RPP rotate aims at that
      # STALE point and oscillates / runs to a wrong heading and never aligns
      # (root cause hardware-confirmed 2026-06-20; see use_rotate_to_heading below).
      rotate_to_heading_once: true
      # Terminal pivot. With this false, neither RotationShim (start-of-path
      # only) nor RPP (mid-path, rotate_to_heading_min_angle: 0.785 rad =
      # 45°) does anything when the navigation ends with a yaw error in the
      # band [yaw_goal_tolerance, RPP-threshold] = [5.7°, 45°]. RPP just
      # holds the carrot at the final pose and outputs near-zero v/ω —
      # goal_checker keeps waiting for yaw alignment that never happens,
      # robot is stuck. Especially visible at NavigateToPose-to-staging
      # handoff in opennav_docking: the staging pose has a fixed heading
      # along the dock axis, but if RPP arrived 10-30° off (common when
      # approaching from the side), the docking action just times out.
      # Setting this true makes RotationShim pivot at the END to match
      # goal heading. Cost: one ~1 s in-place rotation per nav action,
      # which the operator barely notices but the docking-server NEEDS.
      rotate_to_goal_heading: true
      # was true ("wheel odom feedback for pivot completion"), but on this deadband
      # chassis closed_loop:true reads ~0 below the ~0.5 rad/s firmware pivot
      # deadband and stalls the pivot — the same hard lesson already documented for
      # FollowCoveragePath below. Open-loop ramp is required here too.
      closed_loop: false

      # --- RegulatedPurePursuitController (primary) params ---
      transform_tolerance: 0.3            # ARM TF jitter envelope
      desired_linear_vel: 0.30            # transit speed cap (m/s)
      min_approach_linear_velocity: 0.16  # ≥ kMinLinVel=0.15 host clamp (hardware_bridge on_cmd_vel)
      approach_velocity_scaling_dist: 0.6
      # Lookahead: velocity-scaled. At 0.30 m/s → 0.45 m, at 0.13 m/s → 0.20 m.
      use_velocity_scaled_lookahead_dist: true
      lookahead_time: 1.5
      min_lookahead_dist: 0.30            # short-radius near goal
      max_lookahead_dist: 0.90
      # Curvature-based slowdown: when steering radius < 0.9 m, drop to
      # min 0.20 m/s. Keeps tight turns controllable without stalling.
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.20
      use_cost_regulated_linear_velocity_scaling: false
      max_allowed_time_to_collision_up_to_carrot: 1.0
      # DISABLED: RPP's mid-path in-place re-rotate (together with RotationShim
      # re-engaging on each setPlan) fires against the FROZEN transit plan and,
      # once the robot has driven off poses.front(), rotates toward a STALE target
      # → oscillation / wrong-heading runaway (hardware-confirmed 2026-06-20).
      # With rotate_to_heading_once:true above, the shim does ONE start pivot then
      # RPP PURSUES through any mid-path bends (smooth on the deadband chassis).
      use_rotate_to_heading: false
      rotate_to_heading_min_angle: 0.785
      # Match the RotationShim values above (decisive pivot, clear of the
      # firmware deadband) so RPP's mid-path rotate-to-heading hand-off is
      # as smooth as the start-of-path pivot.
      rotate_to_heading_angular_vel: 0.75
      max_angular_accel: 2.5
      allow_reversing: false
      max_robot_pose_search_dist: 10.0
      use_interpolation: true

    # ── Coverage controller: RotationShim + MPPI on the CONTINUOUS full path ─
    # FollowStrip now feeds the WHOLE F2C route as one continuous (CC-Dubins)
    # goal — no per-swath feeding, no in-place U-turn pivots. MPPI tracks the
    # route; PathAlign with use_path_orientations=true keeps it off the
    # anti-parallel return swath. RotationShim wraps MPPI only to do ONE crisp
    # in-place pivot to the path-START heading after transit, then hands off for
    # the rest (it does not re-engage at the U-turn arcs).
    #
    # HARD LESSON (closed_loop, see the block below): closed_loop=true reads ~0
    # odom ω during a sub-deadband pivot and pins the ramp at one accel step
    # (0.25 rad/s) — the pivot never clears the firmware deadband and every
    # coverage goal stalled on "Failed to make progress". closed_loop=false
    # (open-loop ramp to rotate_to_heading_angular_vel) is REQUIRED here; the
    # hardware_bridge gyro angular-rate loop is the responsive inner loop that
    # makes the open-loop assumption valid. The forward drive also depends on
    # the hardware_bridge min_linear_vel=0.05 clamp (was a hardcoded 0.15).
    # (FTC was retired as the coverage controller; its old config lives only
    # in git history.)
    FollowCoveragePath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_mppi_controller::MPPIController"
      # RotationShim does ONE crisp pivot to the path-start heading after
      # transit, then hands the whole CONTINUOUS route to MPPI — it does NOT
      # re-engage at the CC-Dubins U-turn arcs (those stay with MPPI, since
      # setPlan fires once for the single full-path goal).
      # closed_loop MUST stay false: on this deadband chassis closed_loop=true
      # reads ~0 odom ω during the sub-deadband pivot and pins the ramp at one
      # accel step (0.25 rad/s), so the pivot never clears the firmware deadband.
      angular_dist_threshold: 0.30          # >17° off at the start → in-place pivot first
      angular_disengage_threshold: 0.10     # rotate to <5.7° before handing to MPPI (< engage)
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 1.5    # crisp swath-entry/U-turn pivot. 1.0 took ~3.1 s per pivot.
                                            # REVERTED 2.0→1.5 (2026-06-13): 87c5a009 bumped this (with wz_std
                                            # and wz_max) on 2026-06-12 and the robot stopped following the
                                            # swath lines (over-aggressive angular). 1.5 is the proven value
                                            # from the 2026-06-09 config that tracked cleanly.
                                            # closed_loop:false ramp still required on this deadband chassis.
      max_angular_accel: 2.5
      simulate_ahead_time: 1.0
      rotate_to_goal_heading: false         # end heading handled by MPPI GoalAngleCritic
      closed_loop: false                    # open-loop ramp — REQUIRED on a deadband chassis
      # MPPI primary controller.
      time_steps: 36
      model_dt: 0.1                          # = 1/controller_frequency (10 Hz)
      batch_size: 1000
      vx_std: 0.15                           # ~75% of vx band — compromise. Physics suggested 0.10 (~50%) for
                                             # least chatter on straights, but 0.10 left too little exploration
                                             # to recover a large lateral overshoot at a U-turn (MPPI stalled
                                             # vx=0 at ~0.47 m off-line → FollowStrip abort/retry, 2026-06-07).
                                             # 0.15 keeps straights clean while restoring recovery authority.
                                             # (Was 0.20 = 100% of vx_max → over-explored, dither.)
      vy_std: 0.0                            # diff-drive: no lateral DOF
      wz_std: 0.315                          # physics: ~21% of the 1.5 wz band. REVERTED 0.45→0.315
                                             # (2026-06-13): 87c5a009 bumped it to 0.45 on 2026-06-12 and the
                                             # robot stopped following the swath lines — too much angular
                                             # exploration makes MPPI sample big turns on a straight swath and
                                             # the robot weaves ("c'est n'importe quoi"). 0.315 is the proven
                                             # 2026-06-09 value. THE tracking regression — do not re-raise.
      vx_max: 0.20                           # coverage mow speed
      vx_min: 0.0                            # FORWARD-ONLY (2026-06-13). On the continuous joined coverage path,
                                             # allowing reverse made MPPI BACK UP to follow the sharp ~180°
                                             # swath reversals (cusps) instead of turning around — the operator's
                                             # "marches arrière". Forbidding reverse forces a forward turn-around.
                                             # This only works PAIRED with enforce_path_inversion=true below: the
                                             # path handler crops the plan at each cusp so MPPI never sees the
                                             # doubling-back (which, forward-only, used to stall it). Field run
                                             # 2026-06-13 with both = acceptable. (The old fear that forward-only
                                             # stalls at boundary U-turns was the keepout-cost-wall case; the
                                             # local costmap carries no keepout, so it does not apply here.)
      vy_max: 0.0
      wz_max: 1.5                            # the host gyro PI clamps |wz| at angular_rate_max_cmd=1.5, and at
                                             # mowing speed 2*(MAX_MPS-vx)/track caps the no-wheel-clip rate
                                             # near there anyway. REVERTED 2.0→1.5 (2026-06-13): 87c5a009 bumped
                                             # it to 2.0 on 2026-06-12 — unreachable past the clamp and it broke
                                             # line-following. 1.5 is the proven 2026-06-09 value.
      ax_max: 1.0                            # ref 3.0; 0.3 was too low to reach vx_max within the horizon
      ax_min: -1.0
      ay_max: 0.0                            # diff-drive: no lateral DOF
      ay_min: 0.0
      az_max: 2.5                            # matches RotationShim max_angular_accel
      iteration_count: 1
      # FALSE (2026-06-13). The BT joins all F2C segments into ONE continuous
      # path with ~180° reversals (swath U-turns, outer→inner ring doubling-back).
      # We initially set this true to CROP the path at each reversal — but the
      # real root cause was the upstream MPPI bug #5925: findPathFurthestReachedPoint
      # jumped onto the reversal's return leg (Euclidean nearest-point on a curve),
      # making MPPI cut/abandon the turn. With nav2 PR #6055 backported (arc-length
      # path progress, in the vendored nav2_mppi_controller), MPPI tracks straight
      # THROUGH the reversals (rounds them forward), so cropping is unnecessary and
      # counter-productive (it stalled the rings run at the ring→ring crop). Keep
      # OFF. If the backport is ever lost (image rebuild without the patch), MPPI
      # will corner-cut at reversals again — re-vendor the patch, don't flip this.
      enforce_path_inversion: false
      prune_distance: 1.0
      max_robot_pose_search_dist: 1.0        # CRITICAL for the continuous full-path coverage goal: MPPI's
                                             # PathHandler searches the closest pose only in the first N metres
                                             # of the CURRENTLY PRUNED plan, then prunes the plan up to that
                                             # pose. Live AREA4 runs (2026-06-22) confirmed one 376.72 m /
                                             # 11350-pose continuous plan plus repeated 3-7 cm / 2-4.5 deg
                                             # map->odom jumps while the robot sat near self-adjacent parts of
                                             # that route. Keep this window just large enough to include the
                                             # forward turn-around connector (~0.94 m for the nominal 0.30 m
                                             # radius), but not so large that a localisation blip can re-anchor
                                             # progress onto a nearby-yet-arc-length-distant portion.
      transform_tolerance: 0.3               # ARM TF jitter envelope
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      diff_drive:
        plugin: "mppi::DiffDriveMotionModel"
      visualize: false
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.0
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic",
                "PathFollowCritic", "PathAlignCritic", "PathAngleCritic",
                "PreferForwardCritic", "VelocityDeadbandCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:                               # converge to each swath's END pose
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.7              # = our ~0.72 m prediction horizon (36*0.1*0.20 m/s).
                                                # ref 1.4 assumes a 0.5 m/s robot; at 1.4 m every swath
                                                # shorter than 1.4 m was GoalCritic-dominated from pose 0
                                                # (robot beelines to the swath end instead of tracking it)
      GoalAngleCritic:                          # square up to the swath-end heading
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 35.0
        deadband_velocities: [0.15, 0.0, 0.0]   # firmware vx breakaway ≈ 0.15 m/s
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 0.5
        trajectory_point_step: 2
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        offset_from_furthest: 5
        threshold_to_consider: 0.7              # = prediction horizon, pairs with GoalCritic handoff (ref)
      PathAlignCritic:                          # tight swath tracking (the <10 mm goal)
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 7                  # ref 20 = 2.0 m of path, but trajectories only project
                                                 # ~0.72 m at 0.20 m/s → PathAlign never engaged. ~7 pts
                                                 # (≈0.7 m) re-arms the <10 mm swath-tracking near each start
        use_path_orientations: true
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0                      # Nav2 default. Both extremes were tried 2026-06-07 and BOTH hurt:
                                              # 5 occasionally lets MPPI drive a long reverse at a U-turn, but 15
                                              # over-penalised reverse and STALLED the robot at corners. Net:
                                              # the reverse-vs-stall balance at U-turns is NOT a PreferForward
                                              # tuning problem — keep the default; the real lever is turn
                                              # authority (wz_max) / path-window, evaluated separately.
        threshold_to_consider: 0.5

# ---------------------------------------------------------------------------
# Planner server
# ---------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.50
      downsample_costmap: false
      downsampling_factor: 2
      allow_unknown: false
      # Raised from 100000 / 3.5 s: the enlarged 70 m global costmap (see
      # global_costmap below) is a much larger grid, so give A* the budget to plan
      # a long cross-garden transit without false-failing on the iteration/time cap.
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 8.0
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# ---------------------------------------------------------------------------
# Smoother server
# ---------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ---------------------------------------------------------------------------
# Recoveries / Behavior server
# ---------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    # Kilted+ renamed costmap_topic / footprint_topic to local_*_topic
    # (with global_* siblings); the un-prefixed keys are silently ignored.
    # Values match Nav2's local-costmap defaults so this is purely
    # explicit-is-better-than-implicit.
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    controller.transform_tolerance: 0.5
    # 0.5s sim-ahead (at 0.15 m/s BackUp ≈ 7.5 cm) catches immediate
    # collisions without aborting on phantom LETHAL cells 30-50 cm behind
    # (often map→odom jump artefacts or dock residue). 2.0s refused every
    # undock.
    simulate_ahead_time: 0.5
    # 2.5 rad/s (was 1.0) — robot can do ~3.14 rad/s on the bench
    # (360° in ~2 s). Spin recovery should use the real envelope so a
    # 90° recovery turn finishes in ~0.6 s instead of 1.6 s.
    max_rotational_vel: 2.5
    # 0.85 rad/s ≈ wheel vel 0.14 m/s per wheel (PWM 42 > deadband).
    # Lower floor let Spin behavior dither at sub-deadband ω.
    min_rotational_vel: 0.85
    rotational_acc_lim: 5.0

# ---------------------------------------------------------------------------
# Waypoint follower
# ---------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# velocity_smoother removed 2026-04-26 — caps live in the controllers
# (RPP desired_linear_vel, MPPI vx_max/wz_max) and the firmware
# deadband; an extra ramp layer here only added latency and confused
# tuning. cmd_vel pipeline now skips this hop.

# ---------------------------------------------------------------------------
# Global costmap
# ---------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      # 1 Hz after the 2026-05-15 idle-CPU triage. Background: observed
      # planner_server burning ~50 % of one ARM core while the robot was
      # idle — obstacle_layer raytracing 700-ray scans × clearing rays
      # (inf_is_valid=true means every no-return ray traces the full 8 m
      # to mark cells as free), plus inflation_layer recomputation across
      # the full 250×250-cell window every tick. At 1 Hz that work is
      # halved, and the local_costmap @ 10 Hz still drives real-time
      # collision avoidance, so the planner is never working off costmap
      # data older than 1 s — comfortably less than the planning horizon.
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      # TF tolerance: how stale a transform can be before the costmap rejects
      # it. At 0.8 rad/s max angular velocity the old 5.0s allowed up to 229°
      # of rotation error on cached TFs — exactly the "pollution during
      # rotation" symptom observed on the 2026-04-24 mow test. 0.5 s still
      # absorbs the ~300 ms ARM scheduler jitter that motivated the earlier
      # bump, while capping the per-scan rotation smear at ≤22°.
      transform_tolerance: 0.5
      # Experiment 2026-04-24: switch to delta mode (default). The old
      # comment blamed an isCurrent() bug in Nav2 for needing
      # always_send_full_costmap=true, but the Kilted release may have
      # fixed it. If the controller_server starts failing goals with
      # error 107 ("costmap not current"), revert to true. The delta
      # path publishes full snapshot on first connect + only changed
      # cells via /*_costmap_updates thereafter, cutting the steady
      # state publish cost dramatically.
      always_send_full_costmap: false
      # Footprint computed from mowgli_robot.yaml at launch time
      footprint: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      # 0.08 m (was 0.05). At 20×20 m that drops the grid from 400×400 =
      # 160 k cells to 250×250 = 62.5 k — ~2.5× less data per update +
      # publish. The robot footprint (0.40 m wide) still spans ≥5 cells,
      # which is plenty for SmacPlanner2D collision checking. Local
      # costmap stays at 0.05 m so close-range avoidance keeps the finer
      # grid.
      resolution: 0.08
      track_unknown_space: false
      # Rolling window large enough to cover transit across any garden.
      # Unknown space is treated as free (track_unknown_space: false) so the
      # planner can plan through unmapped areas — the robot will discover
      # obstacles via LiDAR as it drives.  This supports arbitrarily large
      # gardens: the costmap always centres on the robot, and obstacles are
      # detected in real time by the obstacle_layer.
      rolling_window: true
      # 70×70 m rolling window (was 20×20). The 20 m window (±10 m radius) was
      # sized for STRIP-TO-STRIP transit within an area, but AREA-TO-AREA transit
      # to a distant zone exceeds it: a goal ~31 m away → SmacPlanner2D rejects it
      # with "Goal Coordinates ... was outside bounds" → the mission reports
      # AREA_UNREACHABLE and never moves (hardware-confirmed 2026-06-20 on a
      # 40×44 m garden). ±35 m now covers cross-garden transits. Safe because the
      # keepout_filter (below) makes everything outside the authorised zones LETHAL,
      # so the planner cannot route outside even with the larger window.
      # TRADE-OFF: at resolution 0.08 m this is 875×875 ≈ 766 k cells (vs ~62 k at
      # 20 m), lowering the full-costmap publish rate on weaker ARM — the original
      # reason for shrinking to 20 m. SIZING RULE: the window is centred on the
      # robot and the planner needs the goal INSIDE it at plan time, so set
      # width/height ≥ 2× the longest per-axis AREA-TO-AREA transit (on the
      # 40×44 m test garden the farthest pair, Back↔Front Main, spans 34 m in Y →
      # ~69 m → 70). To cut cells without losing coverage, coarsen THIS resolution
      # (0.08→0.10 ≈ −36 % cells; the local costmap stays 0.05 m for fine
      # avoidance) rather than shrinking the window.
      width: 70
      height: 70
      # keepout_filter makes the area boundary visible to the Smac planner so
      # transit paths never exit the authorised zone. The mask map_server_node
      # publishes is now the INVERSE/hard-boundary one: every cell outside the
      # union of ALL areas — mowing AND navigation — is LETHAL (100), inside is
      # FREE (0), area obstacle holes are LETHAL. The operator draws navigation
      # areas as the transit/dock corridors, so the dock + approach fall inside
      # an allowed (free) region; the dock corridor is also explicitly carved
      # back to free in map_server. enforce_boundary_margin_m (default 0.25 m)
      # leaves a small free slack outside each edge for RTK drift; disable the
      # whole hard boundary via map_server lethal_outside_areas:=false if a
      # site has no navigation area over the dock (legacy wide keepout_nav_margin
      # free band). The standalone /boundary_violation topic remains as a
      # last-resort tripwire for localization faults. Local costmap stays
      # filter-free (see local_costmap below) so coverage swaths near the edge
      # don't trip MPPI/RPP "collision ahead" and Nav2 local recoveries (spin,
      # backup) still function near edges.
      # inflation_layer is listed AFTER keepout so keepout lethals are inflated
      # by inflation_radius (0.20 m) only — wall 0.25 m outside the centre line
      # → ~0.05 m bite inside it, clear of the swath centres.
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        # 0.20 m (was 0.40). With keepout_nav_margin=0.3 m and robot
        # footprint ±0.20 m lateral, 0.40 m inflation made the footprint
        # corners land inside the inflated zone whenever the robot was
        # within ~0.44 m of the polygon edge — Smac reported "Start
        # 0.20 m (reverted from 0.30): with a 9×6 m polygon and
        # auto-promoted obstacles in the middle, 0.30 m inflation
        # blocked all transit paths between cells — robot got stuck
        # in TRANSIT for 9+ min unable to reach any headland start.
        # Smac's "Inflation layer ... not set sufficiently" warning
        # is performance, not correctness — planner falls back to
        # per-footprint checking. collision_monitor PolygonStop
        # remains the runtime safety guard.
        inflation_radius: 0.20

      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"

# ---------------------------------------------------------------------------
# Local costmap
# ---------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      # update_frequency > controller_frequency (5 Hz) so the costmap is always
      # fresh when the controller ticks. publish_frequency kept low because
      # only the visualisation consumes the topic; OpenMower uses 5/2.
      update_frequency: 10.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      # 0.5 s: balances ARM ~300 ms scheduler jitter against rotation-smear
      # in scan projection. The 5.0 s value used before the 2026-04-24
      # robot_localization test let stale TFs up to 229° out of date drive
      # obstacle placement when the robot was rotating.
      transform_tolerance: 0.5
      # Force periodic full publishes. Without this (default false), the
      # costmap only publishes when its map changes — but with only the
      # inflation_layer and no obstacle source, the map rarely changes,
      # so the publish thread stays idle and isCurrent() never flips true.
      always_send_full_costmap: true
      footprint: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      resolution: 0.05
      rolling_window: true
      # 12×12 m local costmap. The 13 m headland walk plus the controller's
      # ~2 m lookahead window means the robot's lookahead routinely sits
      # 3-5 m from base_footprint; a 6 m costmap
      # truncated the obstacle signal mid-strip (planner replans
      # blind, controller hits unfiltered LiDAR returns). 12 m gives
      # ~6 m radius around base_footprint, enough for any one strip
      # plus its end-of-segment pivot.
      width: 12
      height: 12
      # keepout_filter removed: it marks boundary as LETHAL in the local
      # costmap which triggers RPP "collision ahead" on swaths near the
      # boundary edge. Boundary enforcement is handled by the coverage
      # planner (swaths stay within the polygon) and the collision_monitor
      # (real LiDAR obstacles only). Speed filter also removed as it depends
      # on the same mask infrastructure.
      # (The source layer — obstacle_layer with LiDAR, static_layer without —
      # plus the plugins list are added by the variant overlay.)
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 3.5 (was 10.0): a gentle, WIDE cost gradient is what lets MPPI deviate
        # SMOOTHLY around an obstacle — it starts easing aside ~0.5 m out and
        # rides the gradient, instead of seeing a near-binary lethal cell and
        # jerking at the last moment. (factor 10 decayed to ~0 within ~0.1 m, so
        # even a wide radius had no usable slope.)
        cost_scaling_factor: 3.5
        # 0.60 m (was 0.10). 0.10 gave MPPI no potential field around obstacles
        # → late, sharp, hesitant avoidance. 0.60 m also sits ABOVE the chassis
        # circumscribed radius (~0.572 m), which clears the "inflation radius is
        # smaller than circumscribed radius" error — restoring MPPI CostCritic's
        # potential-field fast path (no full-footprint check = less ARM CPU).
        # SAFE for boundary U-turns: the LOCAL costmap carries NO keepout layer
        # (boundary enforcement is the planner + collision_monitor), so this
        # inflates only real LiDAR obstacles, not the boundary edge.
        inflation_radius: 0.60

# ---------------------------------------------------------------------------
# Map server / AMCL (unused — map->odom is published by ekf_map_node
# (default) or fusion_graph_node (opt-in via use_fusion_graph);
# kept for completeness / Nav2 lifecycle compatibility)
# ---------------------------------------------------------------------------
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ---------------------------------------------------------------------------
# Docking server (opennav_docking)
# ---------------------------------------------------------------------------
docking_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    # TF lookup tolerance — match the other Nav2 servers' 0.5 s envelope.
    # Field 2026-05-27: at 20 Hz controller_frequency the dock controller
    # was querying TF a few ms ahead of the latest ekf_odom_node publish
    # (50 Hz /tf), tripping "Lookup would require extrapolation into the
    # future" on every approach tick → DockRobot exhausted retries in
    # seconds with error 905 "Failed to get control". 0.5 s lets the
    # lookup wait one or two TF publish cycles before giving up. Note
    # the param name is nested under `controller` — bare
    # `transform_tolerance` at this level is silently dropped.
    controller.transform_tolerance: 0.5
    # 10 Hz (was 2 Hz): tighter approach control + faster polling of
    # isDocked()/isCharging() so the robot stops within ~100 ms of the
    # charging signal arriving rather than up to ~500 ms. Not high
    # enough to starve Nav2/robot_localization on ARM.
    controller_frequency: 20.0
    initial_perception_timeout: 5.0
    # Firmware sets STATUS_BIT_CHARGING only after its own ADC debounce
    # (~2-3 s on this platform). 5 s barely covered that; 10 s gives a
    # comfortable margin while still failing fast if physical contact
    # never actually happens.
    wait_charge_timeout: 10.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: base_footprint
    fixed_frame: odom
    # docking_server-level dock_backwards is deprecated in Kilted+; the
    # replacement (dock_direction) lives PER-PLUGIN under
    # simple_charging_dock below. Keep dock_backwards: false here only as
    # an explicit guard — top-level dock_direction is silently ignored.
    dock_backwards: false
    # 0.4 (was 0.5): how close to the staging pose the nav-to-staging phase must
    # get before the dock approach begins. Tighter = the robot starts the
    # straight-line approach better aligned, so there is less cross-track for the
    # graceful controller to redress over the 1.5 m runway → a squarer, more
    # precise final seat. Kept >= RPP's reachable staging accuracy so the
    # nav-to-staging phase doesn't retry.
    dock_prestaging_tolerance: 0.4
    # Disable the docking controller's internal collision check. It
    # projects the dock-approach trajectory through the local_costmap
    # and aborts if any cell exceeds dock_collision_threshold — but the
    # dock structure itself shows up in the obstacle layer as soon as
    # the LiDAR sees it, so the controller refuses its own destination
    # and DockRobot times out with "Failed to get control / Timed out
    # resetting dock approach". collision_monitor (downstream of nav2,
    # always active) still enforces the chassis-polygon emergency stop,
    # so disabling the docking-internal check doesn't remove safety —
    # it just stops the docking server from refusing to dock at the dock.
    controller.use_collision_detection: false
    # Graceful-controller envelope — kept close to Nav2 upstream defaults
    # now that the host-side wz pulse-width modulation (hardware_bridge
    # min_ang_vel_rad_per_s=0.5, duty-cycled so the time-average matches
    # the commanded rate instead of flooring it up) and the sub-deadband
    # vx clamp handle the chassis-side deadband cleanly without
    # over-rotating fine heading corrections. Earlier iterations of this file
    # bumped k_phi/k_delta 3×, dropped v_linear_max, doubled
    # slowdown_radius and raised v_angular_max — each fix worked around
    # the symptom of a different deadband problem, but the combination
    # made the final dock approach oscillate between "rotate only" and
    # "translate only" at 20 Hz and never seat the cradle (measured
    # 2026-05-27 as cmd_vel ping-ponging `x=-0.015 z=0` ↔ `x=0 z=-0.8`).
    # Reset to upstream defaults except:
    #   v_linear_min: 0.16 stays — hardware_bridge zeros |vx|<0.15, so the
    #     crawl-in floor MUST be above the deadband or the final approach is
    #     zeroed and the robot stops short of the cradle. (Regressed to 0.10 /
    #     v_linear_max 0.15 — both at/below the deadband — 2026-06; restored
    #     2026-06-08 and re-synced with nav2_params_no_lidar.yaml. v_linear_max
    #     must stay > v_linear_min.)
    #   beta/lambda: leave at upstream (0.4 / 2.0) — graceful control-law
    #     shape, not deadband-related.
    controller.v_linear_min: 0.16
    # 0.18 (was 0.25): the final drive into the cradle at 0.25 m/s was too fast
    # for a gentle seat (operator 2026-06-12). Dropped to 0.18 — just above the
    # 0.16 deadband floor (must stay > v_linear_min) — so the contacts close
    # slowly. The slowdown_radius profile (below) eases it down to v_linear_min.
    controller.v_linear_max: 0.18
    # 0.85 (was 0.75): the graceful law's steering curvature is -1/r·(…), so it
    # grows as the robot nears the dock (r→0) and is then capped by
    # v_angular_max. Raising the cap lets the controller actually execute the
    # final cross-track correction at crawl speed instead of saturating and
    # arriving slightly off-axis. Kept modest — the host-side wz pulse-width
    # modulation handles the chassis deadband, so this no longer over-rotates
    # fine corrections the way the old k_phi/k_delta 3× bumps did.
    controller.v_angular_max: 0.85
    # 0.45 (was 0.25): within slowdown_radius the linear speed scales down to
    # v_linear_min (v = v_linear_max·r/slowdown_radius, clamped). A larger
    # radius means the robot reaches crawl speed ~20 cm sooner, giving the
    # closed-loop graceful controller far more low-speed distance to null any
    # residual cross-track BEFORE the contacts touch — i.e. it keeps correcting
    # the final trajectory all the way in rather than committing to the last
    # straight at 0.15 m/s. This is a velocity-profile change only (no gain
    # surgery), so it can't reintroduce the rotate↔translate oscillation.
    controller.slowdown_radius: 0.55   # 0.55 (was 0.45, 2026-06-12): start easing to v_linear_min ~10 cm
                                       # sooner so the slower 0.18 m/s approach has even more low-speed
                                       # distance to null residual cross-track before the contacts touch.
    # Graceful smooth-control-law gains — upstream documented defaults.
    # 2026-06-08 field-measured the final approach (logged /cmd_vel_docking +
    # fused/GPS cross-track): omega stayed ~0 the WHOLE approach while cross-track
    # GREW 6 -> 22 cm at a 7.5 deg off-axis heading — the controller squares up
    # parallel and drives straight in without nulling the lateral offset (seats
    # ~20 cm off, no contact, abort). fused == GPS to ~1 cm, so it is NOT
    # localization / a mis-pinned dock pose (supersedes the earlier note). k_delta
    # was too strong vs k_phi (1.33:1); raised to ~4:1 so the controller actually
    # steers back onto the centerline. Back k_phi down if it weaves/oscillates.
    controller.k_phi: 5.0
    controller.k_delta: 2.0
    # Named dock instances — BT uses dock_id="home_dock"
    dock_plugins: ["simple_charging_dock"]
    docks: ["home_dock"]
    home_dock:
      type: "simple_charging_dock"
      frame: map
      pose: [0.0, 0.0, 0.0]  # Overridden at launch from dock_pose_x/y/yaw params
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      # Forward dock approach (matches the YardForce charger contact
      # geometry — robot drives nose-first into the dock).
      dock_direction: "forward"
      # rotate_to_dock=true requires dock_direction=backward in the
      # upstream opennav_docking plugin — combining it with the YardForce
      # nose-first approach throws "Parameter rotate_to_dock is enabled
      # but dock direction is not backward" at CONFIGURE, which aborts
      # the whole Nav2 bringup (lifecycle_manager bails on docking_server
      # → controller/behavior/etc never activate). The pre-rotate would
      # have addressed sub-deadband stalls at large entry angles, but the
      # k_phi=10 / v_angular_max=0.8 graceful-controller tuning already
      # gives enough authority on its own — leave rotate_to_dock=false
      # until upstream supports it for forward docks (or we migrate the
      # YardForce charger to a backward approach).
      rotate_to_dock: false
      # 0.3 A (was 0.1, default 0.5). 0.1 A flipped is_charging_ at the
      # first whisker of contact and DockRobot exited before the cradle
      # was fully seated — the robot ended up barely touching the
      # contacts, intermittent charging on bumps. 0.3 A requires a more
      # established current draw, which on the YardForce charger
      # corresponds to ~0.5 s / ~6 cm of additional forward travel after
      # first contact — enough to drive the contacts past the spring
      # detent into a stable seat. 0.5 A added a full ~1 s of delay
      # (12 cm) which was unnecessary depth.
      charging_threshold: 0.3
      # Geometric distance (m) from base_link to dock pose for isDocked().
      # RTK-Fixed gives σ ~3 mm, so 0.05 m is a comfortable envelope
      # covering antenna-lever-arm effects and short GPS glitches.
      docking_threshold: 0.05
      # 1.5 m straight-line approach: matches dock_approach_corridor_length_m
      # in map_server_node (no-mow zone in front of dock). With only 1.0 m,
      # if RPP arrived at staging with the cap still slightly off (allowed
      # by dock_prestaging_tolerance: 0.5 m), opennav_docking did not have
      # enough straight-line length to redress and the robot hit the dock
      # at an angle ("en biais"). 1.5 m gives the graceful approach
      # controller room to converge before contact.
      staging_x_offset: -1.5
      # GPS-derived dock detection. Static default is false (legacy approach:
      # the dock target is the static map-frame home_dock.pose snapshotted once
      # into odom via map→odom at dockRobot() start — which is exactly what
      # breaks when fusion_graph reloads a corrupt map→odom). navigation.launch.py
      # FLIPS this to true (and zeroes external_detection_translation_*/rotation_*
      # + sets external_detection_timeout/filter_coef) when
      # use_gps_dock_detection is on, and launches gps_dock_detection_node to
      # feed /docking_server/detected_dock_pose from RTK-Fixed /gps/absolute_pose
      # in odom. Keep false here so disabling the feature restores the legacy
      # path cleanly.
      use_external_detection_pose: false
      use_battery_status: true
      battery_topic: "/battery_state"
      use_stall_detection: false
      filter_coef: 0.1

# ---------------------------------------------------------------------------
# Collision monitor
# ---------------------------------------------------------------------------
collision_monitor:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_nav
    # 2026-04-26: bypass velocity_smoother (now removed). Output goes
    # straight to twist_mux on cmd_vel_monitored.
    cmd_vel_out_topic: cmd_vel_monitored
    state_topic: collision_monitor_state
    controller.transform_tolerance: 0.5
    # Source timeout: how long before stale sensor data triggers a stop.
    # ARM boards can have TF/scan timing jitter — 5s avoids false stops
    # while still catching genuinely dead sensors.
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    # The active `polygons`, the polygon definitions, and `observation_sources`
    # are variant-specific and live in the overlay (LiDAR: PolygonSlow soft
    # slowdown on /scan_costmap; no-LiDAR: pass-through with scan disabled).
    # Common note: PolygonStop is intentionally NOT in the active set — it kept
    # firing on obstacles already steered-around lingering in the chassis box,
    # freezing cmd_vel. The STM32 firmware remains the sole emergency-stop
    # authority (CLAUDE.md invariant 9); collision_monitor is the soft layer.

# ---------------------------------------------------------------------------
# Coverage server (mowgli_coverage, Fields2Cover v3 backend)
# Serves mowgli_interfaces/action/PlanCoverage (`plan_coverage`) when the
# BT's PlanCoverageArea node ticks. Returns EXPLICIT ordered segments —
# concentric headland rings + straight serpentine swaths — with NO turn
# planning: the diff-drive pivots in place between segments (RotationShim),
# MPPI tracks each straight swath / smooth ring. operation_width and the
# other geometry knobs are INJECTED at launch from mowgli_robot.yaml — do
# not rely on the static values here.
# ---------------------------------------------------------------------------
coverage_server:
  ros__parameters:
    use_sim_time: false
    # robot_width is the PHYSICAL chassis width — INJECTED at launch from
    # mowgli_robot.yaml.chassis_width via navigation.launch.py. Semantic-only
    # (the geometry is driven by operation_width + the explicit insets), but a
    # wrong value is a trap for anything that later reads it.
    robot_width: 0.40
    # operation_width is the swath SPACING (F2C cov_width). INJECTED at launch
    # as tool_width − swath_overlap (navigation.launch.py), so adjacent swaths
    # slightly OVERLAP. The value below is the node default for isolated
    # runs / tests; keep it = default tool_width (0.18) − swath_overlap (0.02).
    operation_width: 0.16
    # Headland band width (m) — the planner mows ceil(headland_width /
    # operation_width) concentric perimeter rings (min 1) before the straight
    # swaths, unless num_headland_passes (>0) forces a count. INJECTED at
    # launch from mowgli_robot.yaml.headland_width.
    default_headland_width: 0.20
    num_headland_passes: 0
    # chassis_safety_inset: polygon pull-back applied before all planning so
    # the chassis cannot cross the boundary under tracking error. INJECTED at
    # launch (operator override or chassis_width/2); read LIVE per plan.
    chassis_safety_inset: 0.0
    # Drop straight swaths shorter than this (m) — a sliver clip from a
    # concave notch isn't worth an in-place pivot. Read LIVE per plan.
    min_swath_length: 0.15

# ---------------------------------------------------------------------------
# Lifecycle manager
# Note: Nav2's navigation_launch.py creates its own lifecycle_manager_navigation
# with the correct node list. This section provides parameters that get merged
# via RewrittenYaml.
# ---------------------------------------------------------------------------
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 10.0
