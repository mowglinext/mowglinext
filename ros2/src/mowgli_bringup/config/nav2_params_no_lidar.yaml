# Nav2 parameters for Mowgli outdoor robot mower — GPS-only mode (no LiDAR).
#
# This is a variant of nav2_params.yaml for robots without a LiDAR sensor.
# Differences from nav2_params.yaml:
#   - Costmaps: no obstacle_layer (no /scan source)
#   - Collision monitor: scan source disabled (pass-through)
#   - PolygonSlow removed (no obstacle detection to trigger it)
#
# IMPORTANT: When updating nav2_params.yaml, check if changes apply here too.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 60
    # Match the with-lidar config: 1s default is too tight, planner_server's
    # compute_path_to_pose action server isn't always up within 1s of
    # bt_navigator's Activate transition on ARM cold-boot, which fails the
    # whole lifecycle bringup ("Action server compute_path_to_pose not
    # available", error 9001) and leaves bt_navigator inactive — every
    # subsequent NavigateToPose goal gets "Action server is inactive.
    # Rejecting the goal", which the BT then converts into a 3-strike
    # SkipStrip cascade.
    wait_for_service_timeout: 10000
    # Custom Nav2 BT that adds GoalCheckerSelector (required when multiple
    # goal_checker_plugins are configured in controller_server).
    # Paths are injected by navigation.launch.py via RewrittenYaml — keep empty here.
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""
    enable_stamped_cmd_vel: true

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# ---------------------------------------------------------------------------
# Controller server
# ---------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    # 10 Hz: 0.3 m/s × 100 ms = 3 cm per tick. See nav2_params.yaml for
    # the full rationale — needed to close the control loop faster than
    # the 300-400 ms perception-to-action latency.
    controller_frequency: 10.0
    # Without LiDAR, costmaps tick slower (no obstacle observations driving
    # updates) so default 1.0s timeout races with the 1-2 Hz costmap update
    # cycle and surfaces as "Costmap timed out waiting for update" error 207.
    costmap_update_timeout: 5.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 5.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["stopped_goal_checker", "coverage_goal_checker"]
    controller_plugins: ["FollowPath", "FollowCoveragePath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 30.0

    stopped_goal_checker:
      plugin: "nav2_controller::StoppedGoalChecker"
      trans_stopped_velocity: 0.25
      xy_goal_tolerance: 0.75
      yaw_goal_tolerance: 1.0

    coverage_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 6.28
      stateful: true

    # RPP for transit/dock navigation, wrapped in RotationShimController
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      angular_dist_threshold: 0.5
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 3.0
      max_angular_accel: 5.0
      desired_linear_vel: 0.3
      lookahead_dist: 0.4
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.6
      lookahead_time: 1.5
      transform_tolerance: 2.0
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: false
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.6
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.1
      use_rotate_to_heading: false
      allow_reversing: false
      max_angular_vel: 3.0
      max_robot_pose_search_dist: 2.0

    # MPPI controller for coverage mowing — same configuration as
    # nav2_params.yaml (see comments there). Without LiDAR there's no
    # obstacle layer driving ObstaclesCritic; the critic stays enabled
    # but never sees lethal cells, so it costs nothing.
    FollowCoveragePath:
      plugin: "nav2_mppi_controller::MPPIController"
      # Same MPPI configuration as nav2_params.yaml. Without LiDAR there's
      # no obstacle layer feeding ObstaclesCritic; everything still works,
      # the critic just sees no lethal cells.
      time_steps: 30
      model_dt: 0.1
      batch_size: 2000
      vx_std: 0.10
      vy_std: 0.0
      wz_std: 0.30
      vx_max: 0.30
      vx_min: -0.20
      wz_max: 1.0
      ax_max: 0.30
      ax_min: -0.30
      az_max: 1.5
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: false
      regenerate_noises: false
      AckermannConstraints:
        min_turning_r: 0.0
      critics:
        - "ConstraintCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.2
        forward_preference: true

# ---------------------------------------------------------------------------
# Planner server
# ---------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    # See controller_server for rationale — costmap_update_timeout default
    # (1.0s) races with the slow costmap update rate when no LiDAR is
    # driving obstacle layer ticks, causing repeated planning failures.
    costmap_update_timeout: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.50
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 3.5
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# ---------------------------------------------------------------------------
# Smoother server
# ---------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ---------------------------------------------------------------------------
# Recoveries / Behavior server
# ---------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 3.0
    min_rotational_vel: 0.15
    rotational_acc_lim: 5.0
    enable_stamped_cmd_vel: true

# ---------------------------------------------------------------------------
# Waypoint follower
# ---------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# velocity_smoother removed 2026-04-26 — see nav2_params.yaml.

# ---------------------------------------------------------------------------
# Global costmap — no obstacle layer (no LiDAR)
# ---------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      # 2 Hz to match the lidar config — at 1 Hz the planner_server
      # timeout (even with the 5s override) sees stale costmaps too often
      # and repeatedly fails to plan. Cheap with no obstacle layer.
      update_frequency: 2.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      transform_tolerance: 5.0
      footprint: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      resolution: 0.05
      track_unknown_space: false
      rolling_window: true
      width: 200
      height: 200
      # No obstacle_layer — LiDAR is not available.
      # static_layer subscribes to an empty latched OccupancyGrid published
      # by empty_static_map_pub.py — without an always-current layer like
      # this, the global_costmap's current_ flag never settles to true under
      # Nav2 Kilted's KeepoutFilter and the planner aborts every request
      # with "Costmap timed out waiting for update".
      # keepout_filter makes the mowing polygon boundary visible to the
      # planner so transit paths never exit the area. Local costmap stays
      # filter-free so Nav2 recoveries still function near the dock.
      plugins: ["static_layer", "keepout_filter", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: "/no_lidar_static_map"
        subscribe_to_updates: false
        transform_tolerance: 5.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.40

      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"

# ---------------------------------------------------------------------------
# Local costmap — no obstacle layer (no LiDAR)
# ---------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      # 10 Hz to match the lidar config so update_frequency stays above
      # controller_frequency (10 Hz) and the costmap is always fresh when
      # the controller ticks.
      update_frequency: 10.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      footprint: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      resolution: 0.05
      rolling_window: true
      width: 6
      height: 6
      # No obstacle_layer — LiDAR is not available. The static_layer
      # subscribes to the same latched empty OccupancyGrid as the global
      # costmap; without a current source layer the costmap's current_
      # flag never goes true and controller_server aborts every
      # follow_path with "Costmap timed out waiting for update" (107).
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: "/no_lidar_static_map"
        subscribe_to_updates: false
        transform_tolerance: 5.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.40

# ---------------------------------------------------------------------------
# Map server / AMCL (unused — map→odom is a static identity, no SLAM backend;
# kept for completeness / Nav2 lifecycle compatibility)
# ---------------------------------------------------------------------------
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ---------------------------------------------------------------------------
# Docking server (opennav_docking)
# ---------------------------------------------------------------------------
docking_server:
  ros__parameters:
    use_sim_time: false
    # 10 Hz — match nav2_params.yaml. Faster polling of isDocked()/
    # isCharging() so the robot stops within ~100 ms of the charging
    # signal; still low enough to not starve Nav2 on ARM.
    controller_frequency: 10.0
    initial_perception_timeout: 5.0
    # 10 s accommodates the ~2-3 s firmware ADC debounce on
    # STATUS_BIT_CHARGING before /battery_state reflects charging.
    wait_charge_timeout: 10.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: base_footprint
    fixed_frame: odom
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ["simple_charging_dock"]
    docks: ["home_dock"]
    home_dock:
      type: "simple_charging_dock"
      frame: map
      pose: [0.0, 0.0, 0.0]  # Overridden at launch from dock_pose_x/y/yaw params
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      charging_threshold: 0.1
      docking_threshold: 0.05
      # 1.5 m straight-line approach — see nav2_params.yaml for rationale.
      staging_x_offset: -1.5
      use_external_detection_pose: false
      use_battery_status: true
      battery_topic: "/battery_state"
      use_stall_detection: false
      filter_coef: 0.1

# ---------------------------------------------------------------------------
# Collision monitor — no LiDAR (pass-through mode)
# Scan source is declared but disabled. collision_monitor requires at least
# one observation_source to initialize, but it won't trigger stops since the
# source is disabled. PolygonSlow is removed (no sensor data to trigger it).
# ---------------------------------------------------------------------------
collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_footprint
    odom_frame_id: odom
    # 2026-04-26: smoother removed; collision_monitor reads directly from
    # the controller output and writes the post-safety topic.
    cmd_vel_in_topic: cmd_vel_nav
    cmd_vel_out_topic: cmd_vel_monitored
    state_topic: collision_monitor_state
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["PolygonStop", "FootprintApproach"]
    PolygonStop:
      type: "polygon"
      points: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      action_type: "stop"
      min_points: 2
      visualize: false
      polygon_pub_topic: "polygon_stop"
      enabled: false
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 2.0
      simulation_time_step: 0.05
      min_points: 1
      visualize: false
      enabled: false
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: /scan
      enabled: false

# ---------------------------------------------------------------------------
# Coverage server (legacy opennav_coverage config — kept for reference).
# Cell-based strip coverage now handles mowing; no external planner needed.
# ---------------------------------------------------------------------------
coverage_server:
  ros__parameters:
    use_sim_time: false
    robot_width: 0.40
    operation_width: 0.18
    min_turning_radius: 0.01
    linear_curv_change: 200.0
    default_headland_width: 0.50
    default_headland_type: "CONSTANT"
    default_swath_type: "LENGTH"
    default_swath_angle_type: "SET_ANGLE"
    default_swath_angle: 0.0
    default_allow_overlap: false
    default_route_type: "BOUSTROPHEDON"
    default_path_type: "DUBIN"
    default_path_continuity_type: "CONTINUOUS"
    coordinates_in_cartesian_frame: true

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 10.0
