# Nav2 parameters — GPS-only / no-LiDAR overlay (merged onto
# nav2_params_base.yaml). Carries ONLY what differs from the LiDAR variant:
# static-map costmap layers (no /scan obstacle source), a pass-through
# collision_monitor (scan disabled), FollowPath collision detection off, and
# a longer planner costmap_update_timeout (slow costmaps without LiDAR ticks).
# Everything else lives in the base. Deep-merged in navigation.launch.py.

controller_server:
  ros__parameters:
    FollowPath:
      use_collision_detection: false       # no obstacle_layer without LiDAR

planner_server:
  ros__parameters:
    # See controller_server for rationale — costmap_update_timeout default
    # (1.0s) races with the slow costmap update rate when no LiDAR is
    # driving obstacle layer ticks, causing repeated planning failures.
    costmap_update_timeout: 5.0

global_costmap:
  global_costmap:
    ros__parameters:
      plugins: ["static_layer", "keepout_filter", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: "/no_lidar_static_map"
        subscribe_to_updates: false
        transform_tolerance: 0.5


local_costmap:
  local_costmap:
    ros__parameters:
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: "/no_lidar_static_map"
        subscribe_to_updates: false
        transform_tolerance: 0.5


collision_monitor:
  ros__parameters:
    polygons: ["PolygonStop", "FootprintApproach"]
    PolygonStop:
      type: "polygon"
      points: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      action_type: "stop"
      min_points: 2
      visualize: false
      polygon_pub_topic: "polygon_stop"
      enabled: false
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 2.0
      simulation_time_step: 0.05
      min_points: 1
      visualize: false
      enabled: false
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: /scan
      enabled: false
