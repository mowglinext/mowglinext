# Nav2 parameters for Mowgli outdoor robot mower.
# Controller: RegulatedPurePursuit (placeholder until FTCController is integrated).
# Planner:    SmacPlanner2D.
# Costmaps configured for outdoor operation with LiDAR at /scan.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 60
    # Default is 1.0 s — observed on ARM that planner_server / controller_server
    # finish lifecycle transition to active before bt_navigator but their
    # action servers (compute_path_to_pose / follow_path) are not fully
    # registered in the DDS graph yet, so bt_navigator's BT creation fails
    # with "action server not available" and lifecycle_manager aborts
    # bring-up. 10 s is cheap insurance; it only waits longer on startup.
    wait_for_service_timeout: 10000
    # Custom Nav2 BT that adds GoalCheckerSelector (required when multiple
    # goal_checker_plugins are configured in controller_server).
    # Paths are injected by navigation.launch.py via RewrittenYaml — keep empty here.
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""
    # plugin_lib_names: auto-loaded in Kilted — no manual list needed.
    enable_stamped_cmd_vel: true

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# ---------------------------------------------------------------------------
# Controller server
# ---------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    # 10 Hz: 0.3 m/s × 100 ms = 3 cm of motion between Nav2 decisions.
    # Previously 5 Hz, but the 200 ms tick time combined with ~100 ms of
    # cmd_vel / wheel / fusion feedback latency left a 300-400 ms
    # perception-to-action loop — 9-12 cm of motion between "controller
    # sets a command" and "controller sees the result". At strip endpoints
    # and transit corners the robot overshot goals by that full amount,
    # leaving strips hanging over the polygon edge.
    # CPU delta for 5→10 Hz is modest; on a Jazzy stack with rmw_cyclonedds
    # it's well within budget.
    # 10 Hz — robot moves 3 cm per cycle at 0.3 m/s and the upstream
    # GPS / costmap data only refreshes at 5-10 Hz, so a 20 Hz
    # controller would re-evaluate the same snapshot half the time.
    # The previous "course correction lag" was caused by a 2 s RPP
    # transform_tolerance, not by the controller rate.
    controller_frequency: 10.0
    # Default 0.30s causes "Costmap timed out waiting for update" error 107
    # on ARM (local_costmap update gaps of 600ms+ at 5Hz, 2-3s under load).
    # 5s gives headroom while we run local_costmap at 10Hz.
    costmap_update_timeout: 5.0
    # Motor static-friction deadband: PWM_PER_MPS=300 in firmware → 0.10 m/s
    # = PWM 30. Anything below ~0.12 m/s buzzes without moving. Zero
    # sub-deadband commands so the motors don't sit in the buzz zone.
    min_x_velocity_threshold: 0.08
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["stopped_goal_checker", "coverage_goal_checker"]
    controller_plugins: ["FollowPath", "FollowCoveragePath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # 0.15 m / 30 s per CLAUDE.md spec. Tighter than the previous
      # 0.01 m / 300 s — when collision_monitor force-stops the robot on
      # a real obstacle, FollowPath now aborts within 30 s so the BT
      # cancels FollowSegment and re-calls GetNextSegment. The cell
      # walker in coverage_planner re-evaluates against the current
      # OBSTACLE_* classification cells and returns a different segment
      # (or skips the area) instead of running the blade in place.
      required_movement_radius: 0.15
      movement_time_allowance: 30.0

    stopped_goal_checker:
      plugin: "nav2_controller::StoppedGoalChecker"
      trans_stopped_velocity: 0.10
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.5

    # Coverage goal checker: used by FTC controller. Only checks position,
    # not velocity. The FTC controller manages its own stopping logic.
    coverage_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 6.28  # Don't check yaw for coverage paths
      stateful: true             # succeed once within tolerance, don't re-check

    # RPP for transit/dock navigation, wrapped in RotationShimController
    # to rotate-in-place toward the path before driving.
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # Rotation shim: only rotate in place for large heading errors (>60°).
      # Small errors are handled by RPP driving in an arc.
      angular_dist_threshold: 1.0
      forward_sampling_distance: 0.5
      # Restored 2026-04-24 after firmware deadband fix eliminated the
      # lever-arm slide (the reason these were ever lowered). The user
      # explicitly called out that the pre-fix 0.3 values were "tourne
      # tout doucement" unusable. 0.5 rad/s (was 0.8) matches the
      # in-place turn rate OpenMower's PerimeterDocking uses
      # (ANGULAR_SPEED 0.5 in PerimeterDocking.cpp) and the mowgli
      # docking_ftc_local_planner max_cmd_vel_ang of 0.5. 0.8 was
      # 60% above both reference stacks and contributed to the
      # "erratic rotations" reported on 2026-04-24.
      # 0.85 rad/s — at ω=0.5 each wheel runs at 0.08 m/s = PWM ~24,
      # below the firmware ~PWM 40 deadband: motors buzz instead of
      # rotating. 0.85 rad/s lifts wheel vel to 0.14 m/s = PWM 42 with
      # a small margin over the deadband, matching Spin's
      # min_rotational_vel.
      rotate_to_heading_angular_vel: 0.85
      max_angular_accel: 1.0
      # RPP parameters — tuned for slow differential drive motors
      desired_linear_vel: 0.2
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 1.0
      lookahead_time: 1.5
      # 0.3 s — tight enough that course corrections always use a fresh
      # pose. Was 2.0 s, which let RPP pursue lookahead points based on
      # 2-second-old TFs (60 cm of stale-pose error at 0.3 m/s) and
      # showed up as "can't correct course fast enough, drives off
      # boundary". Matches the controller_server tolerance.
      transform_tolerance: 0.3
      # Larger lookahead = smoother turns, less oscillation
      use_velocity_scaled_lookahead_dist: true
      # Above the ~0.12 m/s motor deadband, otherwise RPP slows to a buzz
      # that never reaches the goal.
      min_approach_linear_velocity: 0.15
      approach_velocity_scaling_dist: 0.6
      # RPP collision detection enabled: the local_costmap now carries an
      # obstacle_layer, so RPP can slow/stop when the path is about to hit
      # a real obstacle (not just the pre-planned path blindly).
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.6
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      # Above motor deadband (PWM_PER_MPS=300 → 0.12 m/s ~ PWM 36).
      regulated_linear_scaling_min_speed: 0.15
      # false: use_rotate_to_heading=true caused pivot oscillation at the
      # rotation_shim hysteresis edge (±0.25 rad/s) on slam-toolbox-tuned.
      # Keep arcs-only — RotationShimController handles initial heading.
      use_rotate_to_heading: false
      allow_reversing: false
      # Restored 2026-04-24 from 0.4 to 0.8 after firmware deadband fix.
      # The "lateral-slide artefact during transit" attributed to 0.8 in
      # the previous comment was actually the 2.5× overshoot from the
      # deadband; now that the firmware passes PWM through unchanged,
      # 0.8 rad/s ω cap is safe. At 0.3 m/s linear this gives a minimum
      # turn radius of ~0.375 m — plenty for obstacle avoidance during
      # transit without extra-tight arc constraints.
      max_angular_vel: 0.8
      max_robot_pose_search_dist: 2.0
      # Scale linear velocity down when the tracker has high lateral /
      # angular error — drops to min_approach_linear_velocity when the
      # path curvature is under regulated_linear_scaling_min_radius.
      # Already on via use_regulated_linear_velocity_scaling above.

    # Follow-the-Carrot controller for coverage mowing.
    # PID-based with rotate-in-place state machine — designed for diff-drive.
    # PRE_ROTATE -> FOLLOWING -> WAITING_FOR_GOAL_APPROACH -> POST_ROTATE
    FollowCoveragePath:
      plugin: "mowgli_nav2_plugins/FTCController"
      speed_fast: 0.20             # carrot speed when far from path (m/s)
      speed_fast_threshold: 0.5    # distance threshold for fast/slow (m)
      speed_fast_threshold_angle: 10.0  # angle threshold for fast (deg)
      speed_slow: 0.12             # carrot speed when close/turning (m/s)
      speed_angular: 45.0          # rotation speed for in-place turns (deg/s)
                                   # Matches OpenMower ftc_local_planner.yaml
                                   # (45°/s). Previously 60°/s — 33% higher
                                   # than both OM (45) and mowgli (40), and
                                   # clipping against max_cmd_vel_ang=1.0 rad/s
                                   # (60°/s = 1.05 rad/s > cap) → saturation
                                   # that showed up as erratic tracking.
      # Carrot acceleration. Was 1.0 m/s² ("higher to overcome grass") which
      # is 10× the legacy mowgli FTCPlanner (0.1 m/s²) and reaches the 0.20
      # speed_fast target in 0.2 s instead of 2 s — the operator-visible
      # "robot lurches forward too fast" symptom. 0.2 m/s² gives a smooth
      # 1 s ramp without losing grass authority once moving.
      acceleration: 0.2
      # PID longitudinal — kp halved to 1.0 (legacy mowgli value). The
      # previous 2.0 paired with the 1.0 m/s² acceleration produced a
      # controller that fired hard corrections at every tick.
      kp_lon: 1.0
      ki_lon: 0.0
      kd_lon: 0.0
      # PID lateral — kp=2.0 matches both legacy mowgli and OM. Re-enable
      # a moderate kd_lat (1.0, vs legacy 5.0) to damp lateral oscillation
      # caused by GPS-noise-induced position jitter feeding the lateral
      # error PID. 5.0 (legacy) was too high for our RTK-σ ~3 mm noise
      # floor and amplified jitter; 1.0 bleeds off overshoot without
      # turning the derivative into a noise pump.
      kp_lat: 2.0
      ki_lat: 0.0
      kd_lat: 1.0
      # PID angular — kp=1.5 (between legacy 1.0 and previous 2.5). The 2.5
      # value combined with kp_lon=2.0 / accel=1.0 was tuned for a stack
      # that was visually "too fast"; with the slower carrot ramp it can
      # come back down. kd kept at 0 — derivative on yaw amplified GPS
      # measurement noise on 2026-04-24.
      kp_ang: 1.5
      ki_ang: 0.0
      kd_ang: 0.0
      # Limits — cap angular command at 1.0 rad/s (was 3.0). The UKF
      # becomes lossy above ~0.5 rad/s because GPS+lever-arm correction
      # lags the yaw estimate, so commanding 3 rad/s just feeds garbage
      # into the body-frame lateral state. FTC's PID still hits min
      # turning radii with 1 rad/s at 0.3 m/s.
      # Ceilings bumped above the active targets so the FTC PID has
      # headroom for correction without saturating:
      #   * speed_fast (target) 0.20 m/s, cap 0.35 → 75% headroom
      #   * speed_angular 0.79 rad/s (45°/s), cap 1.5 → ~90% headroom
      # Both reference stacks sit cap ≈ 4–5× target (OM: 1.0/0.4,
      # mowgli: 0.4/0.3, 3.1/0.79 rad/s). Our previous 0.20/1.0 had
      # zero headroom — every correction had to first fight its own
      # ceiling before steering, which looked like "erratic" to the
      # operator. Smoother still enforces the hard global cap
      # (0.25 m/s, 0.8 rad/s) so nothing reaches the motors uncapped.
      max_cmd_vel_speed: 0.30
      # 2026-04-26: dropped from 1.5 → 0.8 to align with smoother cap. Trace
      # showed the FTC PID requesting ±1.5 rad/s on 19% of mowing samples,
      # which the smoother was clipping anyway — but the unclipped PID
      # output drove a yaw-only mode where the controller chased its own
      # tail with no forward progress. Capping at the smoother value lets
      # the PID settle instead of saturating.
      max_cmd_vel_ang: 0.8
      max_goal_distance_error: 0.10  # goal reached within 10cm
      max_goal_angle_error: 15.0     # goal angle tolerance (deg)
      goal_timeout: 10.0
      max_follow_distance: 2.0
      # 2026-04-26: reverted to false after a live test — forward_only=true
      # broke the FTCController's lateral-error recovery: when the PID overshot
      # the carrot, vx clamped to 0 instead of reversing to recenter, leaving
      # only wz to chase a moving carrot → the robot drove in circles. The
      # F9P RTK lag on direction reversals (1.5 s, ~0.30 m bias) is real but
      # is not the right thing to fix at the controller layer. Smoothing the
      # cmd_vel transitions via velocity_smoother accel/decel limits is the
      # better mitigation; the EKF already handles bounded GPS lag.
      forward_only: false
      # Obstacles: check the local_costmap obstacle_layer for the next
      # `obstacle_lookahead` path poses and abort the strip when one
      # of them falls on a LETHAL cell. Previously disabled, which let
      # the robot creep into walls at 30% speed behind collision_monitor.
      check_obstacles: true
      obstacle_lookahead: 5
      obstacle_footprint: true

# ---------------------------------------------------------------------------
# Planner server
# ---------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.50
      downsample_costmap: false
      downsampling_factor: 2
      allow_unknown: false
      max_iterations: 100000
      max_on_approach_iterations: 1000
      max_planning_time: 3.5
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# ---------------------------------------------------------------------------
# Smoother server
# ---------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ---------------------------------------------------------------------------
# Recoveries / Behavior server
# ---------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    # 0.5s sim-ahead (at 0.15 m/s BackUp ≈ 7.5 cm) catches immediate
    # collisions without aborting on phantom LETHAL cells 30-50 cm behind
    # (often map→odom jump artefacts or dock residue). 2.0s refused every
    # undock.
    simulate_ahead_time: 0.5
    max_rotational_vel: 3.0
    # 0.85 rad/s ≈ wheel vel 0.14 m/s per wheel (PWM 42 > deadband).
    # Lower floor let Spin behavior dither at sub-deadband ω.
    min_rotational_vel: 0.85
    rotational_acc_lim: 5.0

# ---------------------------------------------------------------------------
# Waypoint follower
# ---------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# velocity_smoother removed 2026-04-26 — caps live in the controllers
# (FTC max_cmd_vel_speed/ang, RPP desired_linear_vel) and the firmware
# deadband; an extra ramp layer here only added latency and confused
# tuning. cmd_vel pipeline now skips this hop.

# ---------------------------------------------------------------------------
# Global costmap
# ---------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      # 2 Hz after the 2026-04-24 shrink from 30×30 to 20×20 m (160 k cells
      # vs 360 k). Previously capped at 1 Hz because obstacle_layer raycast
      # over the larger grid ate ARM CPU; the 44 % smaller grid gives
      # enough headroom to double both the update and publish rates, which
      # roughly halves the costmap-contributed Foxglove visual lag.
      update_frequency: 2.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      # TF tolerance: how stale a transform can be before the costmap rejects
      # it. At 0.8 rad/s max angular velocity the old 5.0s allowed up to 229°
      # of rotation error on cached TFs — exactly the "pollution during
      # rotation" symptom observed on the 2026-04-24 mow test. 0.5 s still
      # absorbs the ~300 ms ARM scheduler jitter that motivated the earlier
      # bump, while capping the per-scan rotation smear at ≤22°.
      transform_tolerance: 0.5
      # Experiment 2026-04-24: switch to delta mode (default). The old
      # comment blamed an isCurrent() bug in Nav2 for needing
      # always_send_full_costmap=true, but the Kilted release may have
      # fixed it. If the controller_server starts failing goals with
      # error 107 ("costmap not current"), revert to true. The delta
      # path publishes full snapshot on first connect + only changed
      # cells via /*_costmap_updates thereafter, cutting the steady
      # state publish cost dramatically.
      always_send_full_costmap: false
      # Footprint computed from mowgli_robot.yaml at launch time
      footprint: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      resolution: 0.05
      track_unknown_space: false
      # Rolling window large enough to cover transit across any garden.
      # Unknown space is treated as free (track_unknown_space: false) so the
      # planner can plan through unmapped areas — the robot will discover
      # obstacles via LiDAR as it drives.  This supports arbitrarily large
      # gardens: the costmap always centres on the robot, and obstacles are
      # detected in real time by the obstacle_layer.
      rolling_window: true
      # 20×20 m rolling window (was 30×30). At resolution 0.05 m that is
      # 400×400 = 160 k cells instead of 360 k — roughly 44 % of the data
      # per publish tick, which brings the full-costmap publish rate back
      # close to the 2 Hz target on ARM (was 1.3 Hz measured). LD19 useful
      # range is 8 m and robot top speed is 0.3 m/s, so a 10 m planning
      # radius from the rolling-window centre is still well beyond what
      # Smac needs for strip-to-strip transit.
      width: 20
      height: 20
      # keepout_filter makes the polygon boundary visible to the Smac planner
      # so transit paths never exit the mowing area. `keepout_nav_margin_` in
      # map_server_node (default 1.5m) leaves a free band outside the polygon
      # edges so the dock and transit corridor aren't blocked. The standalone
      # /boundary_violation topic remains as a last-resort tripwire for
      # localization faults. Local costmap stays filter-free so Nav2 local
      # recoveries (spin, backup) still function near edges.
      # inflation_layer is listed AFTER keepout so keepout lethals don't get
      # inflated outward, which would bleed into the free margin and block
      # the dock.
      plugins: ["obstacle_layer", "keepout_filter", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        # No persistence: heading drift causes wall duplicates
        observation_persistence: 0.0
        observation_sources: scan
        scan:
          topic: /scan
          # LaserScan is projected to 3D via laser_geometry then filtered by
          # map-frame Z. With ground_constraint keeping base_link Z ≈ 0,
          # lidar is at +0.22 m. Any scan return at Z below 0.08 m is
          # either ground (on a pitched/rolling robot whose scan plane tilts
          # downward) or below the mower skirt and irrelevant. Above 1.5 m
          # is overhead (tree canopy, umbrellas) the mower won't hit.
          # Previously 200 m which was a workaround for old Z-drift bug;
          # now fixed by the ground constraint so we can filter properly.
          min_obstacle_height: 0.08
          max_obstacle_height: 1.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.0
          # Lowered from 0.50 m → 0.10 m so the global costmap sees the
          # same near-field obstacles as the local costmap. Ground/grass
          # clutter is filtered by the min_obstacle_height band (0.08 m
          # floor) now that ground_constraint keeps base_link Z ≈ 0, so
          # we don't need a radial guard band on top of it. The Smac
          # planner's keepout_filter handles dock avoidance on the
          # global side — no need to mask the dock here.
          obstacle_min_range: 0.10
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        # 0.20 m (was 0.40). With keepout_nav_margin=0.3 m and robot
        # footprint ±0.20 m lateral, 0.40 m inflation made the footprint
        # corners land inside the inflated zone whenever the robot was
        # within ~0.44 m of the polygon edge — Smac reported "Start
        # occupied" and the BT SkipStripped forever. 0.20 m inflation
        # gives footprint corners cost-0 cells as long as robot is at
        # least 0.24 m inside the polygon. collision_monitor retains the
        # real-time obstacle cushion.
        inflation_radius: 0.20

      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"

# ---------------------------------------------------------------------------
# Local costmap
# ---------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      # update_frequency > controller_frequency (5 Hz) so the costmap is always
      # fresh when the controller ticks. publish_frequency kept low because
      # only the visualisation consumes the topic; OpenMower uses 5/2.
      update_frequency: 10.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      # 0.5 s: balances ARM ~300 ms scheduler jitter against rotation-smear
      # in scan projection. The 5.0 s value used before the 2026-04-24
      # robot_localization test let stale TFs up to 229° out of date drive
      # obstacle placement when the robot was rotating.
      transform_tolerance: 0.5
      # Force periodic full publishes. Without this (default false), the
      # costmap only publishes when its map changes — but with only the
      # inflation_layer and no obstacle source, the map rarely changes,
      # so the publish thread stays idle and isCurrent() never flips true.
      always_send_full_costmap: true
      footprint: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      resolution: 0.05
      rolling_window: true
      width: 6
      height: 6
      # keepout_filter removed: it marks boundary as LETHAL in the local
      # costmap which triggers RPP "collision ahead" on swaths near the
      # boundary edge. Boundary enforcement is handled by the coverage
      # planner (swaths stay within the polygon) and the collision_monitor
      # (real LiDAR obstacles only). Speed filter also removed as it depends
      # on the same mask infrastructure.
      # Obstacle layer ENABLED so FTCController's obstacle lookahead
      # (check_obstacles=true, obstacle_lookahead=5) can avoid LiDAR-seen
      # obstacles on coverage paths. Collision_monitor alone (PolygonSlow
      # at 30%) was letting the robot creep into walls during FollowStrip.
      # observation_persistence=0 keeps the dock cleared when the robot
      # drives away from it, so it doesn't block BackUp on the next cycle.
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        # Short non-zero persistence (was 0): smooths over the inevitable
        # 1–2 missing scans during ARM TF jitter so transient obstacles
        # don't flicker out of the costmap mid-strip. Long persistence
        # would re-introduce the dock-residue problem post-undock; 2 s
        # is short enough that costmap_scan_filter's 5 s post-undock
        # grace window still clears any dock returns before they expire.
        observation_persistence: 2.0
        # Subscribe to the conditional /scan_costmap stream from
        # costmap_scan_filter_node — same scan as /scan but with returns
        # under dock_blank_range pushed to +inf while is_charging or for
        # post_undock_blank_sec after charging drops. With that filter
        # owning the dock-mask logic, obstacle_min_range can drop to a
        # near-LiDAR floor and the 0.10–0.65 m mowing blind ring closes.
        observation_sources: scan_filtered
        scan_filtered:
          topic: /scan_costmap
          # Same height band as the global obstacle_layer — filter ground
          # hits when the mower pitches on uneven terrain.
          min_obstacle_height: 0.08
          max_obstacle_height: 1.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          # Lowered from 0.65 m → 0.10 m. The dock-mask is now handled
          # by costmap_scan_filter_node (charging-state aware), so this
          # only needs to filter LiDAR self-returns near the housing.
          # 0.10 m closes the previous 0.10–0.65 m blind ring during
          # mowing — collision_monitor and Nav2 now agree on what's
          # in front of the robot.
          obstacle_min_range: 0.10
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        # 0.25 m (was 0.40). Now that obstacle_min_range is 0.10 m and
        # the 0.10–0.65 m ring resolves into real cells, 0.40 m inflation
        # would slam every nearby obstacle into the strip path and force
        # FTCController to abort. 0.25 m gives FTCController's
        # obstacle_lookahead a real cushion without making strips
        # un-followable when an obstacle is 30–40 cm off the swath.
        inflation_radius: 0.25

# ---------------------------------------------------------------------------
# Map server / AMCL (unused — map->odom is published by ekf_map_node
# (default) or fusion_graph_node (opt-in via use_fusion_graph);
# kept for completeness / Nav2 lifecycle compatibility)
# ---------------------------------------------------------------------------
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ---------------------------------------------------------------------------
# Docking server (opennav_docking)
# ---------------------------------------------------------------------------
docking_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    # 10 Hz (was 2 Hz): tighter approach control + faster polling of
    # isDocked()/isCharging() so the robot stops within ~100 ms of the
    # charging signal arriving rather than up to ~500 ms. Not high
    # enough to starve Nav2/robot_localization on ARM.
    controller_frequency: 10.0
    initial_perception_timeout: 5.0
    # Firmware sets STATUS_BIT_CHARGING only after its own ADC debounce
    # (~2-3 s on this platform). 5 s barely covered that; 10 s gives a
    # comfortable margin while still failing fast if physical contact
    # never actually happens.
    wait_charge_timeout: 10.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: base_footprint
    fixed_frame: odom
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    # Disable the docking controller's internal collision check. It
    # projects the dock-approach trajectory through the local_costmap
    # and aborts if any cell exceeds dock_collision_threshold — but the
    # dock structure itself shows up in the obstacle layer as soon as
    # the LiDAR sees it, so the controller refuses its own destination
    # and DockRobot times out with "Failed to get control / Timed out
    # resetting dock approach". collision_monitor (downstream of nav2,
    # always active) still enforces the chassis-polygon emergency stop,
    # so disabling the docking-internal check doesn't remove safety —
    # it just stops the docking server from refusing to dock at the dock.
    controller.use_collision_detection: false
    # Named dock instances — BT uses dock_id="home_dock"
    dock_plugins: ["simple_charging_dock"]
    docks: ["home_dock"]
    home_dock:
      type: "simple_charging_dock"
      frame: map
      pose: [0.0, 0.0, 0.0]  # Overridden at launch from dock_pose_x/y/yaw params
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      charging_threshold: 0.1
      # Geometric distance (m) from base_link to dock pose for isDocked().
      # RTK-Fixed gives σ ~3 mm, so 0.05 m is a comfortable envelope
      # covering antenna-lever-arm effects and short GPS glitches.
      docking_threshold: 0.05
      # 1.5 m straight-line approach: matches dock_approach_corridor_length_m
      # in map_server_node (no-mow zone in front of dock). With only 1.0 m,
      # if RPP arrived at staging with the cap still slightly off (allowed
      # by dock_prestaging_tolerance: 0.5 m), opennav_docking did not have
      # enough straight-line length to redress and the robot hit the dock
      # at an angle ("en biais"). 1.5 m gives the graceful approach
      # controller room to converge before contact.
      staging_x_offset: -1.5
      use_external_detection_pose: false
      use_battery_status: true
      battery_topic: "/battery_state"
      use_stall_detection: false
      filter_coef: 0.1

# ---------------------------------------------------------------------------
# Collision monitor
# ---------------------------------------------------------------------------
collision_monitor:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_nav
    # 2026-04-26: bypass velocity_smoother (now removed). Output goes
    # straight to twist_mux on cmd_vel_monitored.
    cmd_vel_out_topic: cmd_vel_monitored
    state_topic: collision_monitor_state
    transform_tolerance: 0.5
    # Source timeout: how long before stale sensor data triggers a stop.
    # ARM boards can have TF/scan timing jitter — 5s avoids false stops
    # while still catching genuinely dead sensors.
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    # Two-layer protection:
    # 1. Slow zone (chassis +15 cm): reduces to 30% so Nav2 has time to
    #    replan and the operator has a visible cue that the robot saw
    #    something. Larger min_points hysteresis to avoid flapping when
    #    the dock structure clips the zone while charging.
    # 2. Stop zone (chassis +5 cm): hard stop. Tighter than the slow
    #    zone so it only fires for genuinely-imminent contact, which
    #    is what we want during coverage mowing where Nav2's path
    #    following would otherwise be fought by a wider hard-stop.
    polygons: ["PolygonStop", "PolygonSlow"]
    PolygonStop:
      type: "polygon"
      # Chassis + 5 cm — true emergency stop. Coords are
      # [forward_left, forward_right, rear_right, rear_left] in
      # base_footprint frame.
      points: "[[0.55, 0.25], [0.55, -0.25], [-0.15, -0.25], [-0.15, 0.25]]"
      action_type: "stop"
      # 8 points: tight enough that a single stray return doesn't trip
      # a stop, loose enough that a real obstacle (legs, dock) reliably
      # does. Tuned vs the LD19's 7 Hz × ~455-bin sweep.
      min_points: 8
      visualize: true
      polygon_pub_topic: "polygon_stop"
      enabled: true
    PolygonSlow:
      type: "polygon"
      # Chassis + 15 cm — slow to 30% when obstacle is close
      points: "[[0.65, 0.35], [0.65, -0.35], [-0.25, -0.35], [-0.25, 0.35]]"
      action_type: "slowdown"
      slowdown_ratio: 0.3
      # 12 points: the dock structure sits near the polygon boundary
      # when charging, causing rapid slow/normal flapping at 10 Hz.
      # Higher min_points adds hysteresis against that edge noise.
      min_points: 12
      visualize: true
      polygon_pub_topic: "polygon_slow"
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: /scan
      # Disable the height filter (-1.0 / 5.0). The previous setting
      # (min_height: 0.20) was a no-op for a 2D LiDAR — every scan
      # point lands at exactly lidar_z in base frame, so the filter
      # is tout-ou-rien depending on whether lidar_z exceeds
      # min_height. With lidar_z=0.10 on this robot, min_height=0.20
      # rejected every point and collision_monitor saw nothing during
      # mowing. The polygon zones already do the spatial filtering;
      # the lidar plane itself is the relevant z, not a filter band.
      min_height: -1.0
      max_height: 5.0
      enabled: true

# ---------------------------------------------------------------------------
# Lifecycle manager
# Note: Nav2's navigation_launch.py creates its own lifecycle_manager_navigation
# with the correct node list. This section provides parameters that get merged
# via RewrittenYaml.
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Coverage server (legacy opennav_coverage config — kept for reference).
# Cell-based strip coverage now handles mowing; no external planner needed.
# ---------------------------------------------------------------------------
coverage_server:
  ros__parameters:
    use_sim_time: false
    # Robot parameters
    robot_width: 0.40
    operation_width: 0.18
    min_turning_radius: 0.01
    linear_curv_change: 200.0
    # Headland
    default_headland_width: 0.50
    default_headland_type: "CONSTANT"
    # Swath generation
    default_swath_type: "LENGTH"
    default_swath_angle_type: "SET_ANGLE"
    default_swath_angle: 0.0
    default_allow_overlap: false
    # Route ordering
    default_route_type: "BOUSTROPHEDON"
    # Path connecting (turns between swaths)
    default_path_type: "DUBIN"
    default_path_continuity_type: "CONTINUOUS"
    # Coordinate system
    coordinates_in_cartesian_frame: true

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 10.0
