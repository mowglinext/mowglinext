hardware_bridge:
  ros__parameters:
    serial_port: "/dev/mowgli"
    baud_rate: 115200
    heartbeat_rate: 4.0   # Hz – keep-alive messages sent to firmware
    # Serial-link RX watchdog: reopen the port if no STM32 bytes arrive for this
    # long (auto-reconnect after a firmware flash / board reboot / USB
    # re-enumeration, which otherwise leaves the bridge writing to a dead fd).
    serial_rx_timeout_s: 2.0
    publish_rate: 100.0   # Hz – sensor read tick. Actual /imu/data rate
                          # is capped by the firmware packet rate (~47 Hz);
                          # 100 Hz tick ensures every available packet is
                          # consumed promptly without serial backlog.

    # IMU boot-time / re-dock calibration sample count.
    # Firmware publishes gyro+accel at ~48 Hz, so 1000 samples is ~20 s of
    # collection. Raised from the hardware_bridge default (200 → ~4 s) because
    # 4 s of MEMS integration sits in the noisy end of the Allan-variance
    # curve — the residual bias stays elevated. 20 s puts us past the Allan
    # minimum for the WT901, giving ~√5 ≈ 2.2× tighter gyro/accel offsets.
    imu_cal_samples: 1000

    # Closed-loop angular-rate (yaw) controller — see
    # mowgli_hardware/include/mowgli_hardware/angular_rate_controller.hpp for
    # the full rationale, and hardware_bridge_node.cpp:482+ for wiring.
    #
    # 2026-07-17 WEAVE FIX (Option B, task #24, USER-APPROVED sign-off on the
    # task #8 design proposal). *** UNVALIDATED ON HARDWARE — CHANGES
    # PHYSICAL STEERING ON A BLADED ROBOT. Do not run blade-on until the
    # full validation sequence (bench step-response refit -> blade-OFF
    # straight-line weave check -> blade-OFF coverage swaths incl. U-turns ->
    # blade-OFF dock x5 -> blade-ON supervised) has passed. Rollback is
    # params-only: set angular_rate_ki back to 2.0 and angular_rate_kff back
    # to 1.0. ***
    #
    # ki: 2.0 -> 0.0 removes the host integrator that was fighting the
    # per-wheel firmware PIs on the ~50-90 ms USB round trip (the 3-loop
    # integrating cascade identified as the weave's root cause). kff:
    # 1.0 -> 1.35 refits the feed-forward gain toward the measured inverse
    # curve (0.72-0.75 gain in the 0.2-0.4 rad/s band) so it does the
    # deadband + gain compensation the integrator used to absorb. kp is
    # unchanged (still a small damping term).
    angular_rate_ki: 0.0
    angular_rate_kff: 1.35
