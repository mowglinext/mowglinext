hardware_bridge:
  ros__parameters:
    serial_port: "/dev/mowgli"
    baud_rate: 115200
    heartbeat_rate: 4.0   # Hz – keep-alive messages sent to firmware
    # Serial-link RX watchdog: reopen the port if no STM32 bytes arrive for this
    # long (auto-reconnect after a firmware flash / board reboot / USB
    # re-enumeration, which otherwise leaves the bridge writing to a dead fd).
    serial_rx_timeout_s: 2.0
    # Sub-deadband forward-velocity floor (|vx| below this → 0). Lowered from
    # the old hard 0.15: RTK staircase showed smooth motion down to ~0.05 m/s
    # (the host wheel PI bridges the static-friction deadband). 0 disables.
    min_linear_vel: 0.05
    publish_rate: 100.0   # Hz – sensor read tick. Actual /imu/data rate
                          # is capped by the firmware packet rate (~47 Hz);
                          # 100 Hz tick ensures every available packet is
                          # consumed promptly without serial backlog.

    # IMU boot-time / re-dock calibration sample count.
    # Firmware publishes gyro+accel at ~48 Hz, so 1000 samples is ~20 s of
    # collection. Raised from the hardware_bridge default (200 → ~4 s) because
    # 4 s of MEMS integration sits in the noisy end of the Allan-variance
    # curve — the residual bias stays elevated. 20 s puts us past the Allan
    # minimum for the WT901, giving ~√5 ≈ 2.2× tighter gyro/accel offsets.
    imu_cal_samples: 1000

    # --- Per-wheel velocity PI + online feedforward calibration ---
    # Host-side replacement for the wheel PI that used to live in STM32
    # firmware (protocol v2). Runs on the firmware's per-packet wheel velocity
    # (~47 Hz) and emits raw signed PWM (CMD_PWM). Gains are gentle because the
    # loop now eats the USB round-trip latency (~50-90 ms); the learned
    # feedforward carries the steady state. See wheel_rate_controller.hpp.
    max_wheel_mps: 0.5            # per-wheel speed clamp (was firmware MAX_MPS)
    wheel_pi_kp: 30.0            # proportional gain (PWM per m/s of error)
    wheel_pi_ki: 600.0           # integral gain (gentle — host loop has USB dead time)
    wheel_pi_max_pwm: 255.0      # output clamp (PAC5210 8-bit magnitude)
    wheel_pi_integral_max: 60.0  # anti-windup clamp on the integral (PWM)
    # LINEAR acceleration limit (m/s²). Slew-limits forward vx before the
    # diff-drive split — tames linear over-acceleration WITHOUT slowing rotation
    # (the angular/wz command is applied to the wheel differential un-slewed so
    # the gyro angular-rate loop stays responsive). Emergency/watchdog stops
    # reset the ramp. 0 disables.
    linear_accel_limit_mps2: 0.5

    # Online auto-calibration (REDESIGNED 2026-06): learn ONLY the per-wheel
    # slope kff from CLEAN steady states (error settled + integrator well within
    # its clamp + target steady). Deadband is NOT learned online (the old
    # break-free-at-onset capture latched onto oscillation output and ran the
    # deadband to its clamp → over-speed). Passive — never commands motion;
    # suppressed while charging/docked. Persisted to wheel_cal_persist_path.
    # Set wheel_cal_enabled:false to freeze the feedforward at the seeds.
    wheel_cal_enabled: true
    wheel_cal_learn_rate: 0.015  # EMA step for the kff update (small = slow, stable)
    wheel_cal_kff_init: 300.0    # seed PWM per m/s (matches firmware PWM_PER_MPS)
    wheel_cal_deadband_init: 40.0  # seed break-free PWM (fixed — not learned online)
    wheel_cal_kff_min: 100.0
    wheel_cal_kff_max: 600.0
    wheel_cal_deadband_min: 0.0    # only clamps the seeded/persisted deadband on load
    wheel_cal_deadband_max: 120.0
    wheel_cal_learn_v_min: 0.12  # only fit kff at/above this target speed (m/s)
    wheel_cal_err_tol: 0.03      # |error| ≤ this (m/s) counts as steady
    wheel_cal_settle_s: 0.5      # error must stay steady this long before adapting
    wheel_cal_learn_integral_frac: 0.8  # only learn while |integral| < this × integral_max (skip saturation/oscillation)
    wheel_cal_save_period_s: 300.0  # periodic checkpoint while operating (s); 0 disables
    wheel_cal_persist_path: "/ros2_ws/maps/wheel_calibration.txt"
