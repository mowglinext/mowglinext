foxglove_bridge:
  ros__parameters:
    port: 8765
    address: "0.0.0.0"
    send_buffer_limit: 10000000
    num_threads: 0
    # Keep sidecar-internal Universal GNSS topics off the public GUI surface.
    topic_whitelist:
      - "^(?!/(?:_gps_internal|gps_internal|universal_gnss)(?:/.*)?$).*"
    client_topic_whitelist:
      - "^(?!/(?:_gps_internal|gps_internal|universal_gnss)(?:/.*)?$).*"
