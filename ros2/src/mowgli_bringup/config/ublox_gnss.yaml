# Runtime defaults for the dedicated u-blox backend launched via
# `ros2 launch mowgli_bringup ublox_gnss.launch.py`.
#
# GNSS_BACKEND=ublox uses the dedicated USB/libusb u-blox driver.
# Serial UBX receivers should use GNSS_BACKEND=gps with GPS_PROTOCOL=UBX.
#
# The launch file injects DEVICE_FAMILY / DEVICE_SERIAL_STRING / FRAME_ID
# dynamically from docker-compose and launch arguments. docker/.env is the
# installer/compose source of truth; this generated ROS config stays minimal.
ublox_dgnss:
  ros__parameters: {}

ublox_nav_sat_fix_hp:
  ros__parameters: {}

ublox_gnss_adapter:
  ros__parameters: {}
